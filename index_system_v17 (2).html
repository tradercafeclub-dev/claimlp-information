<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trader Cafe Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&family=Rajdhani:wght@500;700&family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>

    :root{
      --gold:#f0b90b;--gold-dim:#c99a00;--gold-soft:rgba(240,185,11,0.11);
      --bg:#0b0e11;--border:rgba(240,185,11,0.18);
      --text:#e8e8e8;--text-dim:#888;
      --sidebar-w:240px;--header-h:56px;--ease:cubic-bezier(.4,0,.2,1);
      --green:#22c55e;--red:#ef4444;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;font-family:'Prompt',sans-serif;background:var(--bg);color:var(--text);}

    /* ── HEADER ── */
    header{
      position:fixed;top:0;left:0;right:0;height:var(--header-h);
      background:linear-gradient(90deg,#0d1117,#131820);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 14px;gap:10px;z-index:300;
      box-shadow:0 2px 24px rgba(0,0,0,0.6);
    }
    .burger{width:36px;height:36px;background:none;border:none;cursor:pointer;
      display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;
      border-radius:8px;transition:background .2s;flex-shrink:0;}
    .burger:hover{background:var(--gold-soft);}
    .burger span{width:20px;height:2px;background:var(--gold);border-radius:2px;
      transition:transform .28s var(--ease),opacity .2s;display:block;}
    .burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .burger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
    .burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
    .logo-btn{display:flex;align-items:center;gap:9px;cursor:pointer;flex-shrink:0;}
    .logo-btn img{width:32px;height:32px;border-radius:50%;filter:drop-shadow(0 0 7px var(--gold));}
    .logo-title{font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:700;
      color:var(--gold);letter-spacing:1px;white-space:nowrap;}
    .active-label{margin-left:auto;font-size:0.75rem;color:var(--text-dim);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
    .active-label b{color:var(--gold);}
    .hconn{font-size:.6rem;padding:2px 7px;border-radius:20px;flex-shrink:0;
      font-family:'Rajdhani',sans-serif;font-weight:600;display:none;}
    .hconn.ok{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.28);display:inline;}
    .hconn.err{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.28);display:inline;}
    .hconn.chk{background:rgba(240,185,11,.1);color:var(--gold);border:1px solid rgba(240,185,11,.28);display:inline;}

    /* ── LAYOUT ── */
    .overlay{display:none;position:fixed;top:var(--header-h);left:var(--sidebar-w);right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:150;}
    .overlay.show{display:block;}
    .layout{display:flex;position:fixed;top:var(--header-h);left:0;right:0;bottom:0;}

    /* ── SIDEBAR ── */
    .sidebar{
      position:fixed;top:var(--header-h);left:0;
      width:var(--sidebar-w);height:calc(100vh - var(--header-h));
      background:linear-gradient(180deg,#0f1318,#0b0e11);
      border-right:1px solid var(--border);
      overflow-y:auto;overflow-x:hidden;z-index:200;
      transform:translateX(-100%);transition:transform .3s var(--ease);
      scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent;
    }
    .sidebar::-webkit-scrollbar{width:3px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}
    .sidebar.open{transform:translateX(0);}
    .sec-label{font-size:0.63rem;font-weight:600;color:var(--text-dim);
      text-transform:uppercase;letter-spacing:1.5px;padding:16px 18px 5px;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 18px;
      cursor:pointer;border-left:3px solid transparent;
      transition:background .2s,border-color .2s,transform .18s var(--ease);
      user-select:none;-webkit-tap-highlight-color:transparent;}
    .nav-item:hover{background:var(--gold-soft);border-left-color:rgba(240,185,11,0.35);transform:translateX(4px);}
    .nav-item:hover .nav-label{color:#fff;}
    .nav-item:hover .nav-icon{transform:scale(1.25);filter:drop-shadow(0 0 6px var(--gold));}
    .nav-item:active{transform:scale(0.96) translateX(2px);background:rgba(240,185,11,0.18);}
    .nav-item.active{background:linear-gradient(90deg,rgba(240,185,11,0.15),transparent);border-left-color:var(--gold);transform:translateX(4px);}
    .nav-item.active .nav-label{color:var(--gold);font-weight:600;}
    .nav-item.active .nav-icon{transform:scale(1.3);filter:drop-shadow(0 0 8px var(--gold));}
    .nav-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0;transition:transform .2s,filter .2s;}
    .nav-label{font-size:0.85rem;white-space:nowrap;transition:color .15s;}
    .nav-dot{width:6px;height:6px;border-radius:50%;background:rgba(240,185,11,0.2);margin-left:auto;flex-shrink:0;transition:background .4s;}
    .nav-dot.loading{background:rgba(240,185,11,0.5);animation:dot-pulse .9s ease-in-out infinite;}
    .nav-dot.ready{background:var(--green);box-shadow:0 0 5px rgba(34,197,94,0.5);}
    .nav-dot.err{background:var(--red);}
    @keyframes dot-pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}

    /* ── CONTENT & PANELS ── */
    .content{flex:1;position:relative;overflow:hidden;background:var(--bg);}
    .panel{
      position:absolute;inset:0;
      opacity:0;pointer-events:none;
      transition:opacity .3s;
      /* ให้ panel มี size จริงเสมอ เพื่อให้ TradingView widget init ได้ */
      visibility:hidden;
    }
    .panel.visible{opacity:1;pointer-events:all;visibility:visible;}

    /* Scroll panel (เนื้อหา + iframe) */
    .scroll-panel{height:100%;overflow-y:auto;overflow-x:hidden;
      scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent;}
    .scroll-panel::-webkit-scrollbar{width:3px;}
    .scroll-panel::-webkit-scrollbar-thumb{background:var(--gold-dim);}

    /* iframe เต็มจอ */
    .frame-wrap{position:relative;width:100%;height:100%;}
    .frame-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;background:var(--bg);}

    /* ── LOADER ── */
    .loader{
      position:absolute;inset:0;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
      z-index:10;transition:opacity .5s;
    }
    .loader.gone{opacity:0;pointer-events:none;}
    .inf-svg{width:90px;height:45px;}
    .inf-bg{fill:none;stroke:rgba(240,185,11,0.1);stroke-width:3.5;stroke-linecap:round;}
    .inf-line{fill:none;stroke:var(--gold);stroke-width:3.5;stroke-linecap:round;
      stroke-dasharray:220;stroke-dashoffset:220;
      filter:drop-shadow(0 0 8px rgba(240,185,11,0.8));
      animation:inf-anim 2.2s ease-in-out infinite;}
    @keyframes inf-anim{0%{stroke-dashoffset:220;opacity:0.3;}45%{stroke-dashoffset:0;opacity:1;}55%{stroke-dashoffset:0;opacity:1;}100%{stroke-dashoffset:-220;opacity:0.3;}}
    .load-txt{font-family:'Rajdhani',sans-serif;font-size:0.85rem;color:var(--gold);
      letter-spacing:2.5px;animation:txt-pulse 2.2s ease-in-out infinite;}
    @keyframes txt-pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

    /* ── INFO CARDS ── */
    .info-block{max-width:1400px;margin:0 auto;padding:16px;}
    .info-wrap{padding:0 0 16px;}
    .info-card{
      background:linear-gradient(135deg,rgba(17,21,27,0.96),rgba(11,14,17,0.99));
      border:1px solid var(--border);border-radius:12px;padding:14px 16px;
      margin-bottom:10px;box-shadow:0 4px 18px rgba(0,0,0,0.4);
      transition:transform .22s var(--ease),box-shadow .22s,border-color .22s;
      cursor:default;}
    .info-card:last-child{margin-bottom:0;}
    .info-card:hover{transform:translateY(-3px) scale(1.008);
      box-shadow:0 8px 28px rgba(240,185,11,0.16);border-color:rgba(240,185,11,0.4);}
    .info-card h3{color:var(--gold);font-size:0.9rem;margin-bottom:8px;font-weight:600;}
    .info-card p,.info-card li{color:#ccc;font-size:0.8rem;line-height:1.72;margin-bottom:4px;}
    .info-card ul{list-style:none;padding:0;}
    .lvl{display:flex;align-items:flex-start;gap:10px;
      background:rgba(240,185,11,0.06);border:1px solid rgba(240,185,11,0.18);
      border-radius:9px;padding:11px;margin-bottom:8px;
      transition:background .2s,border-color .2s,transform .18s var(--ease);}
    .lvl:hover{background:rgba(240,185,11,0.12);border-color:rgba(240,185,11,0.38);transform:translateX(5px);}
    .lvl-no{background:var(--gold);color:#000;font-weight:700;font-size:0.75rem;
      min-width:24px;height:24px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .lvl-txt{font-size:0.79rem;color:#ccc;line-height:1.68;}
    .lvl-txt b{color:var(--gold);}
    .tag{display:inline-block;background:rgba(240,185,11,0.12);color:var(--gold);
      border:1px solid rgba(240,185,11,0.28);border-radius:20px;
      padding:2px 10px;font-size:0.72rem;margin-right:5px;margin-bottom:4px;}

    /* ── MARKET ── */
    .market-container{display:flex;flex-direction:column;height:100%;background:var(--bg);overflow:hidden;}
    .market-header{padding:16px 20px;background:linear-gradient(135deg,rgba(13,17,23,0.99),rgba(11,14,17,0.99));border-bottom:2px solid var(--border);}
    .market-title{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
    .asset-selector{display:flex;gap:8px;flex-wrap:wrap;}
    .asset-btn{padding:9px 16px;background:rgba(255,255,255,0.05);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:0.83rem;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;}
    .asset-btn:hover{background:rgba(240,185,11,0.1);border-color:rgba(240,185,11,0.4);transform:translateY(-2px);box-shadow:0 4px 12px rgba(240,185,11,0.2);}
    .asset-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-dim));border-color:var(--gold);color:#000;font-weight:700;box-shadow:0 4px 16px rgba(240,185,11,0.4);}
    .chart-container{flex:1;position:relative;background:#0a0c0f;overflow:hidden;}
    .chart-wrapper{position:absolute;inset:0;display:none;}
    .chart-wrapper.active{display:block;}
    .chart-frame{width:100%;height:100%;border:none;display:block;}

    /* ── NOCO TABLE PANEL ── */
    .noco-panel{padding:16px;max-width:1400px;margin:0 auto;}
    .noco-title{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .noco-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:14px;}
    .noco-stat{background:linear-gradient(135deg,rgba(15,20,28,.98),rgba(8,11,15,.99));border:1px solid var(--border);border-radius:9px;padding:12px 14px;text-align:center;}
    .noco-stat .sv{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;color:var(--gold);}
    .noco-stat .sl{font-size:.67rem;color:var(--text-dim);margin-top:2px;}
    .search-bar{display:flex;gap:8px;margin-bottom:12px;}
    .search-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;padding:8px 13px;color:var(--text);font-size:.81rem;font-family:'Prompt',sans-serif;outline:none;transition:border-color .2s;}
    .search-input:focus{border-color:rgba(240,185,11,.45);}
    .search-input::placeholder{color:var(--text-dim);}
    .tbl-wrap{overflow-x:auto;border-radius:9px;border:1px solid var(--border);}
    table{width:100%;border-collapse:collapse;}
    thead tr{background:linear-gradient(90deg,rgba(240,185,11,.1),rgba(8,11,15,.9));}
    th{padding:10px 13px;font-family:'Rajdhani',sans-serif;font-size:.72rem;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;text-align:left;white-space:nowrap;}
    td{padding:9px 13px;font-size:.75rem;color:#94a3b8;border-top:1px solid rgba(240,185,11,.05);white-space:nowrap;}
    tbody tr:hover td{background:rgba(240,185,11,.04);color:var(--text);}
    .bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.64rem;font-weight:600;}
    .b-green{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}
    .b-yellow{background:rgba(240,185,11,.12);color:var(--gold);border:1px solid rgba(240,185,11,.25);}
    .b-red{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25);}
    .noco-err{padding:14px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:.78rem;color:#fca5a5;margin-bottom:10px;}
    .retry-btn{padding:7px 18px;background:var(--gold);color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;border:none;border-radius:7px;cursor:pointer;font-size:.82rem;}
    .retry-btn:hover{box-shadow:0 3px 12px rgba(240,185,11,.4);}

    /* ── CLAIM FORM ── */
    .claim-wrap{max-width:560px;margin:0 auto;padding:20px 16px 40px;}
    .claim-card{background:linear-gradient(135deg,rgba(15,20,28,.98),rgba(8,11,15,.99));border:1px solid var(--border);border-radius:14px;padding:24px;}
    .claim-title{font-family:'Rajdhani',sans-serif;font-size:1.15rem;color:var(--gold);margin-bottom:18px;text-align:center;letter-spacing:1px;}
    .fg{margin-bottom:13px;}
    .flbl{font-size:.74rem;color:var(--text-dim);margin-bottom:4px;display:block;}
    .req{color:var(--gold);}
    .finput,.fsel,.ftextarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.81rem;font-family:'Prompt',sans-serif;outline:none;transition:border-color .2s;}
    .finput:focus,.fsel:focus,.ftextarea:focus{border-color:rgba(240,185,11,.5);}
    .fsel option{background:#1a1f26;}
    .ftextarea{resize:vertical;min-height:80px;}
    .factions{display:flex;gap:8px;margin-top:18px;}
    .btn-gold{padding:10px 22px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;transition:box-shadow .2s,transform .15s;flex:1;}
    .btn-gold:hover{box-shadow:0 5px 18px rgba(240,185,11,.45);transform:translateY(-1px);}
    .btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .fmsg{padding:10px 14px;border-radius:8px;font-size:.77rem;margin-top:12px;display:none;}
    .fmsg.ok{background:rgba(34,197,94,.09);border:1px solid rgba(34,197,94,.25);color:var(--green);}
    .fmsg.er{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.25);color:var(--red);}
    .claim-hist{margin-top:22px;}
    .claim-hist-title{font-family:'Rajdhani',sans-serif;font-size:.8rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}

    /* ── REGISTER ── */
    .reg-wrap{max-width:540px;margin:0 auto;padding:20px 16px 40px;}
    .reg-card{background:linear-gradient(135deg,rgba(15,20,28,.98),rgba(8,11,15,.99));border:1px solid var(--border);border-radius:14px;padding:24px;}
    .reg-title{font-family:'Rajdhani',sans-serif;font-size:1.15rem;color:var(--gold);margin-bottom:18px;text-align:center;letter-spacing:1px;}
    .steps{display:flex;margin-bottom:20px;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
    .step-btn{flex:1;text-align:center;padding:9px 4px;font-size:.71rem;font-family:'Rajdhani',sans-serif;color:var(--text-dim);cursor:pointer;transition:background .2s;border:none;background:none;}
    .step-btn.on{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;font-weight:700;}

    /* ── ITEMS GRID (Information page + sub-pages) ── */
    .items-page{padding:14px;max-width:1400px;margin:0 auto;}

    /* Sub-page nav tabs */
    .page-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;
      border-bottom:1px solid var(--border);padding-bottom:10px;}
    .page-tab{padding:7px 16px;border-radius:8px;font-size:.78rem;font-family:'Rajdhani',sans-serif;
      font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text-dim);
      background:rgba(255,255,255,.03);transition:all .2s;letter-spacing:.5px;}
    .page-tab:hover{background:rgba(240,185,11,.09);color:var(--text);border-color:rgba(240,185,11,.35);}
    .page-tab.active{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#000;
      border-color:var(--gold);font-weight:700;box-shadow:0 3px 12px rgba(240,185,11,.3);}

    /* Grid layout */
    .items-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}

    /* ── Card types ── */
    /* hero-banner: full width, tall image with overlay text */
    .card-hero-banner{grid-column:1/-1;position:relative;border-radius:12px;overflow:hidden;cursor:default;}
    .card-hero-banner img{width:100%;height:220px;object-fit:cover;display:block;
      transition:transform .4s var(--ease);}
    .card-hero-banner:hover img{transform:scale(1.03);}
    .card-hero-banner .ho{position:absolute;inset:0;
      background:linear-gradient(180deg,transparent 15%,rgba(0,0,0,.85));
      display:flex;flex-direction:column;justify-content:flex-end;padding:20px 22px;}
    .card-hero-banner h2{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;
      color:#fff;line-height:1.2;margin-bottom:5px;text-shadow:0 2px 8px rgba(0,0,0,.6);}
    .card-hero-banner p{color:rgba(255,255,255,.82);font-size:.8rem;line-height:1.65;
      max-width:700px;text-shadow:0 1px 4px rgba(0,0,0,.5);}

    /* hero: full width, CTA style */
    .card-hero{grid-column:1/-1;position:relative;border-radius:12px;overflow:hidden;}
    .card-hero img{width:100%;height:200px;object-fit:cover;display:block;}
    .card-hero .ho{position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(240,185,11,.18),rgba(0,0,0,.75));
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;}
    .card-hero h2{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;color:#fff;text-align:center;}
    .card-hero p{color:rgba(255,255,255,.85);font-size:.82rem;text-align:center;max-width:500px;line-height:1.6;}
    .card-hero a.cta-btn{display:inline-block;padding:10px 28px;background:var(--gold);color:#000;
      font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;border-radius:8px;
      text-decoration:none;transition:transform .2s,box-shadow .2s;}
    .card-hero a.cta-btn:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(240,185,11,.5);}

    /* stat: number highlight */
    .card-stat{background:linear-gradient(135deg,rgba(240,185,11,.07),rgba(11,14,17,.99));
      border:1px solid rgba(240,185,11,.28);border-radius:10px;padding:20px 16px;text-align:center;
      transition:transform .2s,box-shadow .2s;}
    .card-stat:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(240,185,11,.18);}
    .card-stat h2{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;color:var(--gold);}
    .card-stat p{color:var(--text-dim);font-size:.75rem;margin-top:5px;line-height:1.5;}

    /* section-title: full width divider label */
    .card-section-title{grid-column:1/-1;padding:4px 2px 2px;}
    .card-section-title h3{font-family:'Rajdhani',sans-serif;font-size:.88rem;color:var(--text-dim);
      letter-spacing:2.5px;text-transform:uppercase;
      border-bottom:1px solid var(--border);padding-bottom:8px;}

    /* text-block: full width text */
    .card-text-block{grid-column:1/-1;
      background:linear-gradient(135deg,rgba(17,21,27,.96),rgba(11,14,17,.99));
      border:1px solid var(--border);border-radius:10px;padding:14px 18px;}
    .card-text-block h3{color:var(--gold);font-size:.9rem;margin-bottom:6px;font-weight:600;}
    .card-text-block p{color:#ccc;font-size:.8rem;line-height:1.72;white-space:pre-line;}

    /* service: the main card type */
    .card-service{
      background:linear-gradient(135deg,rgba(17,21,27,.97),rgba(11,14,17,.99));
      border:1px solid var(--border);border-radius:11px;overflow:hidden;
      transition:transform .22s var(--ease),box-shadow .22s,border-color .22s;
      cursor:default;}
    .card-service[data-link]:hover{transform:translateY(-3px);cursor:pointer;
      box-shadow:0 8px 28px rgba(240,185,11,.18);border-color:rgba(240,185,11,.42);}
    /* ── Image Wrapper: ควบคุม overflow และ aspect-ratio ── */
    .card-service .img-wrap{
      overflow:hidden;
      position:relative;
      width:100%;
      flex-shrink:0;
    }
    .card-service .img-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transition:transform .4s;
    }
    .card-service[data-link]:hover .img-wrap img{transform:scale(1.04);}
    .card-service .cb{padding:11px 14px 13px;}
    .card-service h3{color:var(--gold);font-size:.86rem;font-weight:600;margin-bottom:5px;line-height:1.3;}
    .card-service p{color:#aab;font-size:.77rem;line-height:1.68;white-space:pre-line;}

    /* ── Size variants with correct image heights & positions ── */

    /* 1x1 — รูปบุคคล/สี่เหลี่ยม: สูงขึ้น + crop จากบนเพื่อโชว์ใบหน้า */
    .sz-1x1 .img-wrap{height:200px;}
    .sz-1x1 .img-wrap img{object-position:center 15%;}

    /* 2x1 — landscape กว้าง: crop กึ่งกลาง */
    .sz-2x1{grid-column:span 2;}
    .sz-2x1 .img-wrap{height:200px;}
    .sz-2x1 .img-wrap img{object-position:center center;}

    /* 2x2 — การ์ดใหญ่: สูงมากขึ้น crop กึ่งกลาง */
    .sz-2x2{grid-column:span 2;grid-row:span 2;}
    .sz-2x2 .img-wrap{height:320px;}
    .sz-2x2 .img-wrap img{object-position:center center;}

    /* full — เต็มแถว: crop กึ่งกลาง */
    .sz-full{grid-column:1/-1;}
    .sz-full .img-wrap{height:200px;}
    .sz-full .img-wrap img{object-position:center center;}

    /* hero-banner: full width image overlay — crop กึ่งกลาง */
    .card-hero-banner img{object-position:center center;}

    @media(max-width:900px){
      .items-grid{grid-template-columns:repeat(2,1fr);}
      .sz-2x2{grid-column:span 2;}
      .sz-1x1 .img-wrap{height:180px;}
      .sz-2x1 .img-wrap{height:180px;}
      .sz-2x2 .img-wrap{height:260px;}
    }
    @media(max-width:540px){
      .items-grid{grid-template-columns:1fr;}
      .sz-2x1,.sz-2x2,.sz-full,.card-hero-banner,.card-hero,.card-text-block,.card-section-title{grid-column:1/-1;}
      .sz-1x1 .img-wrap{height:220px;}
      .sz-1x1 .img-wrap img{object-position:center 10%;}
      .sz-2x1 .img-wrap,.sz-2x2 .img-wrap,.sz-full .img-wrap{height:200px;}
    }

    .hidden{display:none!important;}
    .info-subpage{animation:fadeIn .22s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:none;}}

    /* ── Registration Notification Bar ── */
    #reg-notify.notify-error{
      background:rgba(246,70,93,0.12);
      border:1px solid rgba(246,70,93,0.5);
      color:#f6465d;
    }
    #reg-notify.notify-success{
      background:rgba(3,192,117,0.1);
      border:1px solid rgba(3,192,117,0.4);
      color:var(--green);
    }
    #reg-notify .notify-field{
      display:inline-block;
      background:rgba(246,70,93,0.2);
      border-radius:5px;padding:1px 8px;margin:2px 3px;
      font-weight:700;font-size:0.78rem;
    }

    /* ── IFRAME DIVIDER ── */
    .iframe-divider{display:flex;align-items:center;gap:12px;padding:10px 16px;background:linear-gradient(90deg,rgba(240,185,11,.08),transparent);border-top:2px solid rgba(240,185,11,.2);border-bottom:1px solid rgba(240,185,11,.12);max-width:1400px;margin:0 auto;}
    .iframe-divider span{font-size:0.72rem;color:var(--gold);letter-spacing:1px;font-family:'Rajdhani',sans-serif;font-weight:600;}
    .iframe-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(240,185,11,.3),transparent);}
    .iframe-block{position:relative;width:100%;min-height:120vh;background:#0a0c0f;}
    .iframe-block iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:block;}

    @media(max-width:768px){
      :root{--sidebar-w:220px;}
      .asset-btn{padding:7px 12px;font-size:.78rem;}
      .noco-panel{padding:10px;}
    }
    @media(max-width:480px){
      .asset-selector{gap:5px;}
      .asset-btn{padding:6px 10px;font-size:.74rem;}
    }
  

/* ═══ Additional styles from index_main ═══ */

:root {
  --gold:#F0B90B; --gold-l:#FFD700; --gold-d:#C99A00;
  --black:#0B0E11; --dark:#12161C; --dark2:#1E2329; --dark3:#2B3139; --dark4:#3C4350;
  --text:#EAECEF; --muted:#848E9C;
  --green:#03C075; --red:#F6465D; --blue:#1890FF;
  --border:rgba(240,185,11,0.2); --border2:rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 15% 10%,rgba(240,185,11,0.06) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 90%,rgba(3,192,117,0.04) 0%,transparent 55%);
  pointer-events:none;z-index:0;}

/* ── NAVBAR ── */
.navbar{position:sticky;top:0;z-index:100;background:rgba(11,14,17,0.97);
  border-bottom:1px solid var(--border);backdrop-filter:blur(20px);
  padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px;}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
.brand img{height:36px;}
.brand-name{font-family:'Orbitron',monospace;font-size:0.82rem;color:var(--gold);letter-spacing:2px;line-height:1.2;}
.brand-sub{font-size:0.6rem;color:var(--muted);letter-spacing:1px;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:8px 14px;border:none;background:transparent;color:var(--muted);
  cursor:pointer;border-radius:6px;font-family:'Sarabun',sans-serif;font-size:0.85rem;transition:all 0.2s;}
.nav-tab:hover{color:var(--gold);background:rgba(240,185,11,0.08);}
.nav-tab.active{color:var(--gold);background:rgba(240,185,11,0.12);border-bottom:2px solid var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.db-badge{font-size:0.7rem;padding:3px 10px;border-radius:12px;border:1px solid;}
.db-ok{background:rgba(3,192,117,0.1);border-color:rgba(3,192,117,0.4);color:var(--green);}
.db-err{background:rgba(246,70,93,0.1);border-color:rgba(246,70,93,0.4);color:var(--red);}
.db-wait{background:rgba(240,185,11,0.1);border-color:rgba(240,185,11,0.3);color:var(--gold);}
.admin-pill{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--black);
  padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:700;cursor:pointer;}
.login-btn{background:transparent;border:1px solid var(--border);color:var(--gold);
  padding:6px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem;font-family:'Sarabun',sans-serif;transition:all 0.2s;}
.login-btn:hover{background:rgba(240,185,11,0.1);}

/* ── PAGES ── */
.page{display:none;padding:24px;max-width:1200px;margin:0 auto;animation:fadeIn 0.3s ease;position:relative;z-index:1;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.page-title{margin-bottom:20px;}
.page-title h1{font-size:1.3rem;font-weight:700;color:var(--gold);}
.page-title p{color:var(--muted);font-size:0.85rem;margin-top:4px;}

/* ── CARDS ── */
.card{background:var(--dark2);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:16px;transition:border-color 0.2s;}
.card:hover{border-color:rgba(240,185,11,0.15);}
.card-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border2);}
.card-title{font-size:0.95rem;font-weight:700;color:var(--gold);}
.card-icon{width:32px;height:32px;background:rgba(240,185,11,0.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;}

/* ── HERO ── */
.hero{text-align:center;padding:48px 20px 40px;background:linear-gradient(135deg,rgba(240,185,11,0.06) 0%,rgba(3,192,117,0.02) 100%);
  border:1px solid rgba(240,185,11,0.12);border-radius:18px;margin-bottom:24px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:300px;height:300px;background:radial-gradient(circle,rgba(240,185,11,0.08),transparent 70%);pointer-events:none;}
.hero-logo{height:80px;margin-bottom:16px;filter:drop-shadow(0 0 20px rgba(240,185,11,0.3));}
.hero-title{font-family:'Orbitron',monospace;font-size:2rem;color:var(--gold);letter-spacing:4px;font-weight:900;}
.hero-sub{color:var(--muted);margin-top:10px;font-size:0.9rem;}
.hero-stats{display:flex;justify-content:center;gap:32px;margin-top:24px;flex-wrap:wrap;}
.hero-stat{text-align:center;}
.hero-stat-val{font-family:'Orbitron',monospace;font-size:1.4rem;color:var(--gold);font-weight:700;}
.hero-stat-lbl{font-size:0.72rem;color:var(--muted);margin-top:2px;}

/* ── STATS GRID ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--dark2);border:1px solid var(--border2);border-radius:12px;padding:18px;text-align:center;position:relative;overflow:hidden;transition:all 0.2s;}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(240,185,11,0.3);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-d));}
.stat-val{font-size:1.5rem;font-weight:700;color:var(--gold);font-family:'Orbitron',monospace;}
.stat-lbl{font-size:0.72rem;color:var(--muted);margin-top:5px;}
.stat-icon{font-size:1.4rem;margin-bottom:6px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.85rem;}
th{background:var(--dark3);color:var(--gold);padding:11px 12px;text-align:left;font-size:0.72rem;letter-spacing:0.8px;white-space:nowrap;font-weight:600;}
td{padding:11px 12px;border-bottom:1px solid var(--border2);white-space:nowrap;}
tr:hover td{background:rgba(240,185,11,0.025);}
tr:last-child td{border-bottom:none;}

/* ── BADGES ── */
.badge{padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;}
.badge-approve{background:rgba(3,192,117,0.12);color:var(--green);border:1px solid rgba(3,192,117,0.3);}
.badge-pending{background:rgba(240,185,11,0.12);color:var(--gold);border:1px solid rgba(240,185,11,0.3);}
.badge-admin{background:rgba(24,144,255,0.15);color:var(--blue);border:1px solid rgba(24,144,255,0.3);}
.badge-beginner{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.1);}

/* ── FORMS ── */
.form-group{margin-bottom:14px;}
.form-label{font-size:0.78rem;color:var(--muted);margin-bottom:6px;display:block;font-weight:600;}
.form-control{width:100%;padding:10px 14px;background:var(--dark3);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:0.88rem;transition:border-color 0.2s;}
.form-control:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(240,185,11,0.12);}
select.form-control option{background:var(--dark3);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr;}}

/* ── BUTTONS ── */
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:0.88rem;font-weight:600;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--black);}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,185,11,0.35);}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-danger{background:rgba(246,70,93,0.12);border:1px solid rgba(246,70,93,0.3);color:var(--red);}
.btn-success{background:rgba(3,192,117,0.12);border:1px solid rgba(3,192,117,0.3);color:var(--green);}
.btn-blue{background:rgba(24,144,255,0.12);border:1px solid rgba(24,144,255,0.3);color:var(--blue);}
.btn-sm{padding:5px 12px;font-size:0.78rem;}
.btn-full{width:100%;justify-content:center;}
button:disabled{opacity:0.5;cursor:not-allowed;transform:none!important;}

/* ── SEARCH ── */
.search-box{position:relative;margin-bottom:14px;}
.search-box input{padding-left:40px;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:0.9rem;pointer-events:none;}

/* ── MEMBER INFO ── */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border2);font-size:0.85rem;}
.info-row:last-child{border-bottom:none;}
.info-k{color:var(--muted);}
.info-v{color:var(--text);font-weight:600;text-align:right;max-width:60%;word-break:break-all;}

/* ── WALLET BOX ── */
.wallet-box{background:var(--dark3);border:1px solid rgba(240,185,11,0.25);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.wallet-addr{font-family:monospace;font-size:0.78rem;color:var(--gold);word-break:break-all;flex:1;}
.qr-img{width:140px;height:140px;border-radius:10px;border:2px solid var(--border);object-fit:cover;}

/* ── PROFIT BREAKDOWN ── */
.profit-wrap{background:linear-gradient(135deg,rgba(240,185,11,0.07),rgba(240,185,11,0.02));
  border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:14px;}
.profit-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.profit-row:last-child{border-bottom:none;}
.profit-lbl{font-size:0.84rem;color:var(--muted);}
.profit-val{font-weight:700;font-size:0.95rem;}
.pv-gold{color:var(--gold);}
.pv-green{color:var(--green);}
.pv-red{color:var(--red);}

/* ── TRADE ITEM ── */
.trade-item{background:var(--dark3);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.trade-num{width:28px;height:28px;background:rgba(240,185,11,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:var(--gold);flex-shrink:0;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;top:var(--header-h,56px);left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:190;align-items:flex-start;justify-content:center;padding:12px 12px 24px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:18px;max-width:700px;width:100%;margin:0 auto;display:flex;flex-direction:column;animation:slideUp 0.3s ease;}
.modal-sm{max-width:420px;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
/* Header — ปุ่มปิดมองเห็นเสมอ ไม่ถูก app header บัง */
.modal-hd{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 14px;flex-shrink:0;background:var(--dark2);border-radius:18px 18px 0 0;border-bottom:1px solid rgba(255,255,255,0.07);}
.modal-body{padding:18px 20px 24px;}

/* ── MOBILE NAV ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(11,14,17,0.98);
  border-top:1px solid var(--border);padding:6px;z-index:100;grid-template-columns:repeat(4,1fr);}
@media(max-width:768px){.mobile-nav{display:grid;}body{padding-bottom:68px;}.nav-tabs{display:none;}}
.mnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:0.63rem;font-family:'Sarabun',sans-serif;border-radius:6px;transition:all 0.2s;}
.mnav-btn.active{color:var(--gold);}
.mnav-btn span:first-child{font-size:1.1rem;}

/* ── STEPS ── */
.steps{display:flex;gap:8px;margin-bottom:20px;}
.step{flex:1;height:5px;background:rgba(240,185,11,0.2);border-radius:3px;transition:background 0.35s;}
.step.active{background:var(--gold) !important;box-shadow:0 0 8px rgba(240,185,11,0.4);}

/* ── ALERTS ── */
.api-ok{background:rgba(3,192,117,0.1);border:1px solid rgba(3,192,117,0.3);border-radius:8px;padding:12px;color:var(--green);font-size:0.84rem;margin-bottom:12px;}
.api-err{background:rgba(246,70,93,0.1);border:1px solid rgba(246,70,93,0.3);border-radius:8px;padding:12px;color:var(--red);font-size:0.84rem;margin-bottom:12px;}

/* ── LOADING ── */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(11,14,17,0.92);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.spinner{width:48px;height:48px;border:3px solid var(--dark3);border-top:3px solid var(--gold);border-radius:50%;animation:spin 0.75s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{color:var(--gold);font-family:'Orbitron',monospace;font-size:0.78rem;letter-spacing:2px;}

/* ── PULSE ── */
.pulse{width:8px;height:8px;background:currentColor;border-radius:50%;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.3);}}

/* ── MISC ── */
.sep{height:1px;background:var(--border2);margin:16px 0;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--dark4);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-d);}

/* ── PAYMENT MODAL SPECIAL ── */
.pay-modal-card{background:var(--dark3);border-radius:14px;overflow:hidden;border:1px solid var(--border2);}
.pay-modal-header{background:linear-gradient(135deg,#1a1f28,#0f1318);padding:16px 20px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;}
.pay-amount-box{background:linear-gradient(135deg,var(--gold),var(--gold-d));border-radius:12px;padding:16px;text-align:center;}
.pay-amount-lbl{font-size:0.68rem;color:rgba(0,0,0,0.6);font-weight:600;}
.pay-amount-val{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;color:var(--black);}
.trade-hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
.trade-hist-item{background:var(--dark2);border:1px solid var(--border2);border-radius:8px;padding:8px;text-align:center;}
.trade-coin{font-size:0.65rem;color:var(--gold);font-weight:700;margin-bottom:3px;}
.trade-amount{font-size:0.88rem;font-weight:700;color:var(--green);}

/* ── ADMIN AUTH ── */
.auth-wall{display:flex;align-items:center;justify-content:center;min-height:60vh;}
.auth-card{background:var(--dark2);border:1px solid var(--border);border-radius:18px;padding:36px;max-width:380px;width:100%;text-align:center;}
.auth-icon{font-size:3rem;margin-bottom:16px;}
.auth-title{font-family:'Orbitron',monospace;font-size:1rem;color:var(--gold);margin-bottom:8px;letter-spacing:2px;}
.auth-sub{color:var(--muted);font-size:0.83rem;margin-bottom:24px;}

/* ── WALLET MANAGER ── */
.wallet-item{background:var(--dark3);border:1px solid var(--border2);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:all 0.2s;}
.wallet-item.active-wallet{border-color:rgba(240,185,11,0.5);background:rgba(240,185,11,0.06);}
.wallet-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.wallet-dot.active-dot{background:var(--green);}
.wallet-info{flex:1;min-width:0;}
.wallet-label{font-size:0.78rem;font-weight:700;color:var(--text);}
.wallet-address{font-family:monospace;font-size:0.7rem;color:var(--muted);word-break:break-all;margin-top:2px;}

/* ── TEAM CARD ── */
.team-card{background:var(--dark3);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;}
.team-card:hover{border-color:rgba(240,185,11,0.3);background:rgba(240,185,11,0.03);}
.team-card-hd{display:flex;justify-content:space-between;align-items:flex-start;}
.team-name{font-size:1rem;font-weight:700;}
.team-meta{font-size:0.77rem;color:var(--muted);margin-top:4px;}
.team-stats{display:flex;gap:16px;margin-top:10px;}
.team-stat{font-size:0.78rem;color:var(--muted);}
.team-stat b{color:var(--text);}

/* ── PAYMENT EXPLORER ── */
.pex-wrap{display:flex;flex-direction:column;gap:0;}

/* Search bar */
.pex-search-bar{position:relative;margin-bottom:12px;}
.pex-search-input{width:100%;padding:12px 16px 12px 44px;background:var(--dark3);border:2px solid var(--border2);
  border-radius:12px;color:var(--text);font-size:0.9rem;font-family:'Prompt',sans-serif;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;box-sizing:border-box;}
.pex-search-input:focus{border-color:rgba(240,185,11,0.6);box-shadow:0 0 0 3px rgba(240,185,11,0.08);}
.pex-search-input::placeholder{color:var(--muted);}
.pex-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;pointer-events:none;}
.pex-clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.08);
  border:none;color:var(--muted);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:0.8rem;
  display:none;align-items:center;justify-content:center;transition:all 0.15s;}
.pex-clear-btn:hover{background:rgba(246,70,93,0.2);color:var(--red);}
.pex-clear-btn.show{display:flex;}

/* Mode tabs — 4 ปุ่มหลัก */
.pex-mode-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.pex-mode-btn{padding:9px 6px;border-radius:10px;border:1px solid var(--border2);background:var(--dark3);
  color:var(--muted);font-size:0.75rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;
  font-family:'Prompt',sans-serif;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2;}
.pex-mode-btn .pex-mode-icon{font-size:1.1rem;}
.pex-mode-btn:hover{border-color:rgba(240,185,11,0.3);color:var(--text);background:rgba(255,255,255,0.03);}
.pex-mode-btn.active-all{background:rgba(240,185,11,0.12);border-color:rgba(240,185,11,0.5);color:var(--gold);font-weight:700;}
.pex-mode-btn.active-team{background:rgba(240,185,11,0.12);border-color:rgba(240,185,11,0.5);color:var(--gold);font-weight:700;}
.pex-mode-btn.active-lva{background:rgba(3,192,117,0.12);border-color:rgba(3,192,117,0.5);color:var(--green);font-weight:700;}
.pex-mode-btn.active-lvb{background:rgba(24,144,255,0.12);border-color:rgba(24,144,255,0.5);color:var(--blue);font-weight:700;}

/* Secondary filter row: time + status */
.pex-filter-row2{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.pex-time-tabs{display:flex;border:1px solid var(--border2);border-radius:8px;overflow:hidden;flex-shrink:0;}
.pex-time-btn{padding:7px 14px;border:none;background:var(--dark3);color:var(--muted);
  font-size:0.78rem;cursor:pointer;font-family:'Prompt',sans-serif;transition:all 0.15s;white-space:nowrap;}
.pex-time-btn.active{background:rgba(240,185,11,0.15);color:var(--gold);font-weight:700;}
.pex-month-select{padding:8px 12px;background:var(--dark3);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:0.82rem;font-family:'Prompt',sans-serif;outline:none;cursor:pointer;
  flex:1;min-width:130px;display:none;}
.pex-month-select.show{display:block;}
.pex-status-group{display:flex;gap:5px;margin-left:auto;}
.pex-status-btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--dark3);
  color:var(--muted);font-size:0.75rem;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:'Prompt',sans-serif;}
.pex-status-btn:hover{border-color:rgba(240,185,11,0.3);color:var(--text);}
.pex-status-btn.active-approve{background:rgba(3,192,117,0.12);border-color:rgba(3,192,117,0.4);color:var(--green);font-weight:700;}
.pex-status-btn.active-pending{background:rgba(240,185,11,0.12);border-color:rgba(240,185,11,0.4);color:var(--gold);font-weight:700;}

/* Active filter chips */
.pex-active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;min-height:0;}
.pex-filter-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:0.72rem;font-weight:600;background:rgba(240,185,11,0.1);color:var(--gold);
  border:1px solid rgba(240,185,11,0.3);cursor:pointer;transition:all 0.15s;}
.pex-filter-tag:hover{background:rgba(246,70,93,0.1);color:var(--red);border-color:rgba(246,70,93,0.3);}
.pex-filter-tag.la-tag{background:rgba(3,192,117,0.1);color:var(--green);border-color:rgba(3,192,117,0.3);}
.pex-filter-tag.lb-tag{background:rgba(24,144,255,0.1);color:var(--blue);border-color:rgba(24,144,255,0.3);}
.pex-filter-tag.month-tag{background:rgba(155,89,182,0.1);color:#c39bd3;border-color:rgba(155,89,182,0.3);}

/* Summary stats grid — แสดงตามผลการค้นหา */
.pex-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.pex-sum-card{background:var(--dark3);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;text-align:center;position:relative;overflow:hidden;}
.pex-sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.pex-sum-card.s-profit::before{background:linear-gradient(90deg,var(--gold),var(--gold-d));}
.pex-sum-card.s-member::before{background:linear-gradient(90deg,var(--green),rgba(3,192,117,0.4));}
.pex-sum-card.s-guar::before{background:linear-gradient(90deg,var(--blue),rgba(24,144,255,0.4));}
.pex-sum-card.s-count::before{background:linear-gradient(90deg,var(--muted),rgba(132,142,156,0.4));}
.pex-sum-card.s-unique::before{background:linear-gradient(90deg,#c39bd3,rgba(155,89,182,0.4));}
.pex-sum-label{font-size:0.62rem;color:var(--muted);letter-spacing:0.5px;margin-bottom:5px;text-transform:uppercase;}
.pex-sum-val{font-family:'Orbitron',monospace;font-size:0.88rem;font-weight:700;line-height:1.2;}

/* List rows */
.pex-list-header{font-size:0.7rem;color:var(--muted);padding:6px 10px;text-transform:uppercase;
  letter-spacing:1px;border-bottom:1px solid var(--border2);margin-bottom:4px;}
.pex-row{display:flex;align-items:center;gap:10px;padding:11px 10px;border-radius:10px;cursor:pointer;
  transition:background 0.15s,border-color 0.15s;border:1px solid transparent;}
.pex-row:hover{background:rgba(255,255,255,0.04);border-color:rgba(240,185,11,0.2);}
.pex-row-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,rgba(240,185,11,0.18),rgba(240,185,11,0.04));
  border:1px solid rgba(240,185,11,0.25);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;font-weight:700;color:var(--gold);}
.pex-row-main{flex:1;min-width:0;}
.pex-row-name{font-weight:700;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pex-row-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:3px;}
.pex-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:10px;font-size:0.65rem;font-weight:700;cursor:pointer;transition:filter 0.15s;}
.pex-tag:hover{filter:brightness(1.3);}
.pex-tag-team{background:rgba(240,185,11,0.1);color:var(--gold);border:1px solid rgba(240,185,11,0.2);}
.pex-tag-lva{background:rgba(3,192,117,0.1);color:var(--green);border:1px solid rgba(3,192,117,0.2);}
.pex-tag-lvb{background:rgba(24,144,255,0.1);color:var(--blue);border:1px solid rgba(24,144,255,0.2);}
.pex-row-profit{font-family:'Orbitron',monospace;font-size:0.88rem;font-weight:700;color:var(--gold);}
.pex-row-member{font-size:0.7rem;color:var(--green);margin-top:1px;}
.pex-row-date{font-size:0.68rem;color:var(--muted);}
.pex-row-divider{height:1px;background:rgba(255,255,255,0.04);margin:1px 0;}
.pex-empty{text-align:center;padding:40px 20px;color:var(--muted);}
.pex-empty-icon{font-size:2.5rem;margin-bottom:10px;}

/* Pagination */
.pex-pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:14px 0 2px;flex-wrap:wrap;}
.pex-page-btn{min-width:32px;height:32px;padding:0 8px;border-radius:8px;border:1px solid var(--border2);background:var(--dark3);
  color:var(--muted);font-size:0.78rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s;font-family:'Prompt',sans-serif;}
.pex-page-btn:hover:not(:disabled){border-color:rgba(240,185,11,0.3);color:var(--text);}
.pex-page-btn.pex-page-active{background:rgba(240,185,11,0.15);border-color:rgba(240,185,11,0.5);color:var(--gold);font-weight:700;}
.pex-page-btn:disabled{opacity:0.3;cursor:not-allowed;}
.pex-page-info{font-size:0.73rem;color:var(--muted);padding:0 4px;}

.modal-title{font-size:1.05rem;font-weight:700;color:var(--gold);}
/* ── MODAL CLOSE BUTTON — high contrast, always visible ── */
.modal-close{
  width:40px;height:40px;border-radius:10px;
  background:rgba(246,70,93,0.18);
  border:2px solid rgba(246,70,93,0.5);
  color:#ff6b81;font-size:1.2rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;line-height:1;
  box-shadow:0 2px 8px rgba(246,70,93,0.2);
}
.modal-close:hover{background:rgba(246,70,93,0.35);border-color:rgba(246,70,93,0.8);color:#fff;transform:scale(1.05);}

/* old pex-search-wrap — keep for compat */
.pex-search-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.pex-search-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.pex-search-relative{position:relative;flex:1;min-width:200px;}
.pex-filter-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border2);background:var(--dark3);
  color:var(--muted);font-size:0.78rem;cursor:pointer;transition:all 0.15s;white-space:nowrap;font-family:'Prompt',sans-serif;flex-shrink:0;}
.pex-filter-btn:hover{border-color:rgba(240,185,11,0.3);color:var(--text);}
.pex-filter-btn.pex-active{background:rgba(240,185,11,0.12);border-color:rgba(240,185,11,0.4);color:var(--gold);font-weight:700;}
.pex-filter-btn.pex-active-green{background:rgba(3,192,117,0.12);border-color:rgba(3,192,117,0.4);color:var(--green);font-weight:700;}
.pex-month-select-old{padding:9px 12px;background:var(--dark3);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-size:0.82rem;font-family:'Prompt',sans-serif;outline:none;cursor:pointer;min-width:130px;}
.pex-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;
  background:var(--dark3);border:1px solid var(--border2);border-radius:10px;align-items:center;}
.pex-stat-chip{display:flex;align-items:center;gap:5px;font-size:0.76rem;color:var(--muted);}
.pex-stat-chip b{font-family:'Orbitron',monospace;font-size:0.82rem;font-weight:700;}
.pex-stat-divider{width:1px;height:16px;background:var(--border2);}
/* Filter button row — horizontal scroll on mobile */
.pex-filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.pex-filter-row::-webkit-scrollbar{display:none;}

/* ── COMMISSION PAGE ── */
.comm-hero{background:linear-gradient(135deg,rgba(240,185,11,0.1),rgba(3,192,117,0.05));
  border:1px solid rgba(240,185,11,0.2);border-radius:16px;padding:28px 24px;margin-bottom:20px;position:relative;overflow:hidden;}
.comm-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(240,185,11,0.12),transparent 70%);pointer-events:none;}
.comm-summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.comm-sum-card{border-radius:14px;padding:18px;position:relative;overflow:hidden;cursor:pointer;transition:all 0.25s;}
.comm-sum-card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,0.4);}
.comm-sum-card.your-team{background:linear-gradient(135deg,rgba(240,185,11,0.15),rgba(240,185,11,0.05));border:1px solid rgba(240,185,11,0.35);}
.comm-sum-card.level-a{background:linear-gradient(135deg,rgba(3,192,117,0.15),rgba(3,192,117,0.05));border:1px solid rgba(3,192,117,0.35);}
.comm-sum-card.level-b{background:linear-gradient(135deg,rgba(24,144,255,0.15),rgba(24,144,255,0.05));border:1px solid rgba(24,144,255,0.35);}
.comm-sum-card.total{background:linear-gradient(135deg,rgba(240,185,11,0.2),rgba(3,192,117,0.1));border:2px solid rgba(240,185,11,0.5);}
.comm-sum-label{font-size:0.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.comm-sum-amount{font-family:'Orbitron',monospace;font-size:1.6rem;font-weight:900;line-height:1.1;}
.comm-sum-sub{font-size:0.72rem;color:var(--muted);margin-top:6px;}
.comm-sum-badge{position:absolute;top:12px;right:12px;font-size:0.62rem;padding:3px 8px;border-radius:10px;font-weight:700;}

/* ── MONTH SELECTOR ── */
.month-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none;}
.month-tabs::-webkit-scrollbar{display:none;}
.month-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;
  color:var(--muted);cursor:pointer;font-family:'Sarabun',sans-serif;font-size:0.8rem;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.month-tab.active{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--black);border-color:transparent;font-weight:700;}
.month-tab:hover:not(.active){border-color:rgba(240,185,11,0.4);color:var(--gold);}

/* ── COMM SECTION CARD ── */
.comm-section{background:var(--dark2);border:1px solid var(--border2);border-radius:14px;margin-bottom:16px;overflow:hidden;transition:all 0.25s;}
.comm-section-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;transition:background 0.2s;}
.comm-section-hd:hover{background:rgba(255,255,255,0.03);}
.comm-section-hd-left{display:flex;align-items:center;gap:12px;}
.comm-section-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.comm-section-title{font-size:1rem;font-weight:700;}
.comm-section-amount{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;}
.comm-section-body{padding:0 20px 20px;display:none;}
.comm-section-body.open{display:block;}
.comm-section-chevron{transition:transform 0.3s;font-size:1.1rem;color:var(--muted);}
.comm-section-chevron.open{transform:rotate(180deg);}

/* ── COMM STATS ROW ── */
.comm-stats-mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.comm-stat-mini{background:var(--dark3);border-radius:10px;padding:12px;text-align:center;}
.comm-stat-mini-val{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;}
.comm-stat-mini-lbl{font-size:0.68rem;color:var(--muted);margin-top:4px;}

/* ── MEMBER PAYMENT TABLE ── */
.mem-pay-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
  background:var(--dark3);margin-bottom:6px;cursor:pointer;transition:all 0.2s;}
.mem-pay-row:hover{background:var(--dark4);border-left:2px solid var(--gold);}
.mem-pay-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;}

/* ── PAY SCHEDULE BANNER ── */
.pay-schedule{background:linear-gradient(135deg,rgba(3,192,117,0.12),rgba(3,192,117,0.04));
  border:1px solid rgba(3,192,117,0.3);border-radius:12px;padding:14px 18px;margin-bottom:16px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.pay-schedule-icon{font-size:1.6rem;flex-shrink:0;}
.pay-schedule-info{flex:1;}
.pay-schedule-title{font-weight:700;color:var(--green);font-size:0.9rem;}
.pay-schedule-detail{font-size:0.78rem;color:var(--muted);margin-top:2px;}

/* ── COMMISSION DASHBOARD (all-team overview) ── */
.comm-dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.comm-dash-card{border-radius:12px;padding:16px;text-align:center;position:relative;overflow:hidden;}
.comm-dash-card.yt{background:linear-gradient(135deg,rgba(240,185,11,0.15),rgba(240,185,11,0.05));border:1px solid rgba(240,185,11,0.35);}
.comm-dash-card.la{background:linear-gradient(135deg,rgba(3,192,117,0.15),rgba(3,192,117,0.05));border:1px solid rgba(3,192,117,0.35);}
.comm-dash-card.lb{background:linear-gradient(135deg,rgba(24,144,255,0.15),rgba(24,144,255,0.05));border:1px solid rgba(24,144,255,0.35);}
.comm-dash-card.tot{background:linear-gradient(135deg,rgba(240,185,11,0.22),rgba(3,192,117,0.1));border:2px solid rgba(240,185,11,0.5);}
.comm-dash-label{font-size:0.68rem;letter-spacing:1px;font-weight:700;margin-bottom:4px;opacity:0.75;}
.comm-dash-amt{font-family:'Orbitron',monospace;font-size:1.15rem;font-weight:900;line-height:1.2;}
.comm-dash-sub{font-size:0.7rem;color:var(--muted);margin-top:4px;}
.comm-dash-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 12px 12px;}

/* ── ADMIN COMM GROUPED CARD ── */
.comm-group-card{background:var(--dark3);border:1px solid var(--border2);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:border-color 0.2s;}
.comm-group-card.all-approved{border-color:rgba(3,192,117,0.4);}
.comm-group-hd{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:1px solid rgba(255,255,255,0.06);}
.comm-group-name{font-size:1rem;font-weight:800;}
.comm-group-total{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;color:var(--gold);}
.comm-group-total-lbl{font-size:0.65rem;color:var(--muted);text-align:right;}
.comm-group-rows{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.comm-type-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
  border-radius:10px;flex-wrap:wrap;gap:8px;transition:background 0.15s;}
.comm-type-row.yt-row{background:rgba(240,185,11,0.06);border:1px solid rgba(240,185,11,0.15);}
.comm-type-row.la-row{background:rgba(3,192,117,0.06);border:1px solid rgba(3,192,117,0.15);}
.comm-type-row.lb-row{background:rgba(24,144,255,0.06);border:1px solid rgba(24,144,255,0.15);}
.comm-type-row.approved-row{opacity:0.7;}
.comm-type-row-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.comm-type-row-meta{font-size:0.73rem;color:var(--muted);margin-top:2px;}
.comm-type-row-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

const _cache={};
async function nocoGet(tid,params=''){
  const key=tid+params, now=Date.now();
  if(_cache[key]&&now-_cache[key].ts<60000) return _cache[key].data;
  const url=`${NOCO.base}/api/v1/db/data/noco/${NOCO.proj}/${tid}?limit=500${params}`;
  let retries=3, delay=1200;
  while(retries-->0){
    try{
      const r=await fetch(url,{headers:{'xc-token':NOCO.token}});
      if(r.status===429){await sleep(delay);delay*=2;continue;}
      if(!r.ok) throw new Error('HTTP '+r.status);
      const d=await r.json();
      const list=d.list||d.data||[];
      _cache[key]={data:list,ts:now};
      return list;
    }catch(e){
      if(retries<=0) throw e;
      await sleep(delay);delay*=1.5;
    }
  }
  throw new Error('ไม่สามารถโหลดข้อมูลได้');
}

async function nocoPost(tid,body){
  const r=await fetch(`${NOCO.base}/api/v1/db/data/noco/${NOCO.proj}/${tid}`,{
    method:'POST',headers:{'xc-token':NOCO.token,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

// สร้าง Table ใน NocoDB ถ้ายังไม่มี
async function ensureTable(name,fields){
  // ดึง tables list ก่อน
  const metaR=await fetch(`${NOCO.base}/api/v1/db/meta/projects/${NOCO.proj}/tables`,
    {headers:{'xc-token':NOCO.token}});
  if(!metaR.ok) return null;
  const meta=await metaR.json();
  const tables=meta.list||[];
  const exist=tables.find(t=>t.title===name);
  if(exist) return exist.id;
  // สร้างใหม่
  const cr=await fetch(`${NOCO.base}/api/v1/db/meta/projects/${NOCO.proj}/tables`,{
    method:'POST',headers:{'xc-token':NOCO.token,'Content-Type':'application/json'},
    body:JSON.stringify({title:name,columns:fields})
  });
  if(!cr.ok) return null;
  const cdata=await cr.json();
  return cdata.id||null;
}

{t:'Team Level And Commission',s:'ส่วนแบ่งรายได้ในการสร้างทีม ;\n\nระดับที่ 1   Your Team : Do your Own\n\nลูกทีมของคุณเทรดเอง คุณจะได้รับส่วนแบ่งค่าคอมมิชชั่นจำนวน 10% ของวงเงินที่ลูกทีมของคุณเทรดได้\n\nระดับที่ 2   Your Team : Level  A\n\nลูกทีมของคุณสร้างทีมใหม่ คุณจะได้รับส่วนแบ่งค่าคอมมิชชั่นจำนวน 15% ของรายได้ที่ลูกทีมของคุณทำได้ทั้งหมด\n\nระดับที่ 3   Your Team : Level  B\n\nหลานทีมของคุณสร้างทีมใหม่ คุณจะได้รับส่วนแบ่งค่าคอมมิชชั่นจำนวน 10% ของรายได้ที่หลานทีมของคุณทำได้ทั้งหมด\n\nหมายเหตุการจ่ายค่าคอมมิชั่น \n\nทางระบบจะคำนวนตัดยอดรายได้ค่าคอมมิชชั่น ในทุกๆสิ้นเดือน และจะจ่ายค่าคอมมิชั่น ให้กับทุกส่วนที่เกี่ยวข้องเป็นเหรียญ USDT เข้าบัญชี Binance ของสมาชิก ในวันที่ 15 ของเดือนถัดไป\n\nรายละเอียดรายได้ทั้งหมดของทีมจะถูกแสดงไว้ในรายการโดยละเอียด สมาชิกและเจ้าของทีมสามารถตรวจสอบได้',l:'',i:'https://www.hec.ca/etudiants/mon-programme/baa/specialisations/finance/HEC_2694_salle_marche.jpg',z:'full',y:'service',p:'home'},

{t:'What you will get?',s:'สิ่งที่คุณจะได้รับ\nส่วนที่ 1 คุณเทรดในบัญชี "ไบแนนซ์" ของคุณเอง โดยไม่มีการเชื่อมต่อใดๆ กับภายนอก\nส่วนที่ 2 คุณจะมี "เลขาส่วนตัว" คอยดูแล และให้ข้อมูลการเทรดตลอดระยะเวลา 7 วัน ให้บริการตลอด 24 ชั่วโมง โดยที่คุณไม่ต้องเฝ้ากราฟหน้าจอ\nส่วนที่ 3 คุณจะได้รับการ "ประกันกำไร" ขั้นต่ำ 10% ต่อเดือน (ช่วงทดลองเทรดเป็นระยะเวลา 3 เดือน)\nส่วนที่ 4 คุณจะได้รับการ "คุ้มครองวงเงินเทรด  100%" ในกรณีที่พอร์ตของคุณได้รับความเสียหาย (ช่วงทดลองเทรดเป็นระยะเวลา 3 เดือน)',l:'',i:'https://static.vecteezy.com/system/resources/previews/009/276/512/large_2x/stock-market-chart-business-using-a-tablet-to-analyze-online-trading-data-forex-graph-financial-and-investment-on-a-virtual-screen-concept-free-photo.jpg',z:'2x1',y:'service',p:'Trade'},
{t:'Share of profits from trading',s:'ส่วนแบ่งของกำไรที่ได้จากการเทรด \nส่วนที่ 1 จะแบ่งให้เป็นส่วนของค่าคอมมิชชั่นของทีมงาน 10% \nส่วนที่ 2 จะแบ่งให้เป็นส่วนของการประกันรายได้ 10% \nส่วนที่ 3 จะแบ่งให้เป็นส่วนของรายได้ผู้เทรด 40% \nส่วนที่ 4 จะแบ่งให้เป็นส่วนการบริหารจัดการระบบ 40%',l:'',i:'https://t4.ftcdn.net/jpg/16/46/67/75/360_F_1646677511_oa22vnPbMgL97BlyjPP811YhaBG3UVYS.jpg',z:'2x1',y:'service',p:'Trade'},

{t:'Our Mission In Thailand',s:'ทำไมเราถึงกล้าให้เงินสนับสนุน ???\nTrader Cafe Club คือโครงการสุดล้ำที่จับมือกับพันธมิตรระดับโลกอย่าง Binance\nกระดานเทรดเหรียญคริปโตเคอร์เรนซีอันดับ 1 ของโลก !!  \nเรามุ่งยกระดับเทรดเดอร์ไทยให้ก้าวสู่ระดับมืออาชีพ พร้อมสร้างชุมชนนักลงทุน เทรดเดอร์ ที่แข็งแกร่ง ขณะเดียวกันเรายังขยายเครือข่ายร้านกาแฟให้เติบโตอย่างยั่งยืน และจุดประกายเศรษฐกิจชุมชนให้คึกคักยิ่งขึ้น  \nนี่ไม่ใช่แค่โครงการทั่วไป แต่เป็นโอกาสที่จะเชื่อมโยงโลกคริปโตฯ เข้ากับชีวิตประจำวัน \nจิบกาแฟ อัปเดตตลาด พร้อมสร้างรายได้ และสร้างชุมชนเทรดเดอร์ไปด้วยกัน!!\nมาเข้าร่วมกับเรา แล้วสร้างรายได้ อนาคตที่สดใสให้เทรดเดอร์และชุมชนร้านกาแฟไทยไปด้วยกัน',l:'',i:'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcST61eNLggl3VBdn9QL_qGopq9x-K38u80yRw&s',z:'full',y:'service',p:'about'},

{t:'More than 30 awards',s:'Trader Cafe Club  เป็น Digital Trader Agency โบรกเกอร์คริปโตและ CFD ชั้นนำที่ให้บริการข้อมูลแบบครบวงจรสำหรับการซื้อ ขาย และจัดเก็บคริปโตเคอร์เรนซี รวมถึงการแนะนำส่งต่อความรู้เกี่ยวกับการแลกเปลี่ยนคริปโตต่างๆทั่วโลก รวมถึงการซื้อขายในตลาดกว่า 150 ตลาดที่เป็นที่นิยม เช่น คริปโตฟิวเจอร์สและ CFD ในคริปโต ฟอเร็กซ์ ดัชนี สินค้าโภคภัณฑ์ และหุ้น โดยใช้ทั้งเงินเฟียตและคริปโต ตั้งแต่ก่อตั้งในปี 2017 Trader Cafe Club เติบโตอย่างรวดเร็ว โดยให้บริการนักลงทุนกว่า 1,000,000 รายในกว่า 150 ประเทศ และสามารถสร้างรายได้ให้กับนักลงทุนแล้วมากกว่า 590 ล้านดอลลาร์ ทั่วโลก ด้วยเป้าหมายที่จะทำให้การลงทุนเข้าถึงได้สำหรับทุกคน Trader Cafe Club ลดอุปสรรคในการเข้าถึง โดยให้การเข้าถึงตลาดการเงินที่ง่ายและปลอดภัยด้วยเงื่อนไขการซื้อขายชั้นนำของอุตสาหกรรมและเครื่องมือที่เป็นนวัตกรรมใหม่ ลูกค้าจึงมั่นใจได้ว่าจะได้ทำการซื้อขายกับผู้ให้บริการทางการเงินอันดับหนึ่งของโลกที่น่าเชื่อถือ และไว้วางใจได้อย่างแพลตฟอร์มของไบแนนซ์ ซึ่งมุ่งมั่นที่จะเสริมสร้างศักยภาพให้แก่นักลงทุนและนำเสนอสิ่งที่ดีกว่า ในเงื่อนไขที่ปลอดภัยสำหรับนักลงทุนทุกคน',l:'',i:'https://i.ibb.co/Pzf7q19s/TCC-Reward.jpg',z:'2x2',y:'service',p:'about'},

// ── Render card ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderCard(it){
  const y=it.y, z=it.z, lnk=it.l, img=it.i;
  const onclick=lnk?`onclick="window.open('${esc(lnk)}','_blank')"` :'';
  const dlnk=lnk?` data-link="1"`:'';

  // ── helper: สร้าง img tag ที่ครอบด้วย img-wrap ──
  const mkImg=(src,alt,extraStyle='')=> src
    ? `<div class="img-wrap"${extraStyle?` style="${extraStyle}"`:''}><img src="${esc(src)}" alt="${esc(alt||'')}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
    : '';

  if(y==='hero-banner'){
    return`<div class="card-hero-banner" ${onclick} style="${lnk?'cursor:pointer':''}">
      ${img?`<img src="${esc(img)}" alt="${esc(it.t)}" loading="lazy" onerror="this.style.display='none'" style="width:100%;height:220px;object-fit:cover;object-position:center center;display:block;transition:transform .4s;">`:''}
      <div class="ho"><h2>${esc(it.t)}</h2>${it.s?`<p>${esc(it.s).replace(/\n/g,'<br>')}</p>`:''}</div>
    </div>`;
  }
  if(y==='hero'){
    return`<div class="card-hero">
      ${img?`<img src="${esc(img)}" alt="${esc(it.t)}" loading="lazy" onerror="this.style.display='none'" style="width:100%;height:200px;object-fit:cover;object-position:center center;display:block;">`:''}
      <div class="ho"><h2>${esc(it.t)}</h2>${it.s?`<p>${esc(it.s)}</p>`:''}
        ${lnk?`<a href="${esc(lnk)}" target="_blank" class="cta-btn">เริ่มต้นเลย →</a>`:''}
      </div>
    </div>`;
  }
  if(y==='stat'){
    const szCls=z==='2x2'?'sz-2x2':z==='2x1'?'sz-2x1':'';
    return`<div class="card-stat ${szCls}">
      <h2>${esc(it.t)}</h2><p>${esc(it.s)}</p>
      ${img?`<div style="margin-top:10px;overflow:hidden;border-radius:8px;"><img src="${esc(img)}" loading="lazy" onerror="this.parentElement.style.display='none'" style="width:100%;height:120px;object-fit:cover;object-position:center;display:block;"></div>`:''}
    </div>`;
  }
  if(y==='section-title'){
    return`<div class="card-section-title"><h3>${esc(it.t)}</h3></div>`;
  }
  if(y==='text-block'){
    return`<div class="card-text-block">
      <h3>${esc(it.t)}</h3>${it.s?`<p>${esc(it.s).replace(/\n/g,'<br>')}</p>`:''}
    </div>`;
  }
  // ── default: service card ──
  let szCls='sz-1x1';
  if(z==='2x2') szCls='sz-2x2';
  else if(z==='2x1') szCls='sz-2x1';
  else if(z==='full') szCls='sz-full';

  return`<div class="card-service ${szCls}"${dlnk} ${onclick}>
    ${mkImg(img, it.t)}
    <div class="cb">
      <h3>${esc(it.t)}</h3>${it.s?`<p>${esc(it.s).replace(/\n/g,'<br>')}</p>`:''}
    </div>
  </div>`;
}

function renderItemsPage(pageId){
  const rows=ITEMS.filter(x=>x.p===pageId);
  if(!rows.length) return`<div style="text-align:center;padding:40px;color:var(--text-dim)">📭 ไม่มีข้อมูล</div>`;
  return`<div class="items-grid">${rows.map(renderCard).join('')}</div>`;
}

// ── Build information HTML ──
function buildInformationHTML(){
  const tabs=INFO_PAGES.map((pg,i)=>
    `<button class="page-tab${i===0?' active':''}" data-pg="${pg.id}" onclick="switchInfoPage('${pg.id}')">${pg.label}</button>`
  ).join('');
  const pages=INFO_PAGES.map((pg,i)=>
    `<div class="info-subpage${i===0?'':' hidden'}" id="isp_${pg.id}">${renderItemsPage(pg.id)}</div>`
  ).join('');
  return`<div class="scroll-panel">
    <div class="items-page">
      <div class="page-tabs">${tabs}</div>
      ${pages}
    </div>
  </div>`;
}

function switchInfoPage(pgId){
  document.querySelectorAll('.page-tab').forEach(b=>b.classList.toggle('active',b.dataset.pg===pgId));
  document.querySelectorAll('.info-subpage').forEach(d=>d.classList.toggle('hidden',d.id!=='isp_'+pgId));
}

function switchSysTab(tabId){

function buildSystemPaymentStats(){
  const pending=PAYMENTS.filter(p=>payVal(p,'position')==='Pending').length;
  const total=PAYMENTS.reduce((s,p)=>s+payNum(p,'profit'),0);
  // Update System panel stats (sys-sub-home)
  const sa=v=>{document.querySelectorAll(`[id="${v[0]}"]`).forEach(e=>e.textContent=v[1]);};
  sa(['stat-members',MEMBERS.length]);
  sa(['stat-teams',TEAMS.length]);
  sa(['stat-payments',PAYMENTS.length]);
  sa(['stat-pending',pending]);
  sa(['stat-total-profit',fmtUSD(total)]);
  // Update Payment panel stats (pmt- prefixed)
  document.querySelectorAll('[id="pmt-stat-members"]').forEach(e=>e.textContent=MEMBERS.length);
  document.querySelectorAll('[id="pmt-stat-teams"]').forEach(e=>e.textContent=TEAMS.length);
  document.querySelectorAll('[id="pmt-stat-payments"]').forEach(e=>e.textContent=PAYMENTS.length);
  document.querySelectorAll('[id="pmt-stat-pending"]').forEach(e=>e.textContent=pending);
  document.querySelectorAll('[id="pmt-stat-total-profit"]').forEach(e=>e.textContent=fmtUSD(total));
}

// ── โหลด ITEMS จาก NocoDB — เรียกครั้งเดียวตอน init ──
async function initNocoItems(){
  // Step 1: ตรวจสอบ / สร้าง table
  if(!NOCO.tbl.items){
    try{ await ensureItemsTable(); }catch(e){ console.warn('ensureItemsTable:',e.message); }
  }
  if(!NOCO.tbl.items){
    console.log('📋 Items table ไม่พบ — ใช้ hardcode ITEMS');
    return;
  }
  try{
    delete _cache[NOCO.tbl.items+''];
    const rows = await nocoGet(NOCO.tbl.items,'');
    if(rows && rows.length > 0){
      // ── NocoDB มีข้อมูล → ใช้ NocoDB เป็น source of truth ──
      const _isImg=u=>{if(!u)return false;const l=u.toLowerCase();
        return l.endsWith('.jpg')||l.endsWith('.jpeg')||l.endsWith('.png')||
               l.endsWith('.webp')||l.endsWith('.gif')||
               ['stockcake','shutterstock','vecteezy','freepik','ibb.co',
                'istockphoto','pixabay','dreamstime','techresearchonline',
                'seekingalpha','decrypt.co','bookmap','blueberrymarkets',
                'ftcdn','businesspost','openaccessgovernment','starinvestment',
                'media.licdn','bnbstatic','equitypandit','centralworld',
                'hec.ca','corporatefinanceinstitute','thaifranchisecenter',
                'gstatic.com/images','img.freepik','cdn.prod.website'].some(h=>l.includes(h));
      };
      const nocoMapped = rows.map(r=>{
        const lk = ITEMS_IMG_LOOKUP[r.Title]||[];
        let img = r.ImageUrl||'', lnk = r.LinkUrl||'';
        if(!_isImg(img)&&_isImg(lnk)){[img,lnk]=[lnk,img];}
        if(!img&&lk[0]) img=lk[0];
        return{t:r.Title||'',s:r.Subtitle||'',i:img,l:lnk,
               p:r.Page||'home',y:r.Type||'service',z:r.Size||'1x1',_nocoId:r.Id};
      });
      // แทนที่ ITEMS ด้วยข้อมูลจาก NocoDB ทั้งหมด
      ITEMS.length = 0;
      nocoMapped.forEach(it=>ITEMS.push(it));
      _nocoItemsLoaded = true;
      console.log('✅ ITEMS โหลดจาก NocoDB แล้ว:',ITEMS.length,'รายการ');
      // Re-render หน้า Information ทันที
      refreshInfoPanel();
    } else {
      // ── NocoDB ยังไม่มีข้อมูล → ใช้ hardcode (ITEMS ปัจจุบัน) ──
      console.log('📋 NocoDB Items ว่างเปล่า — ใช้ hardcode ITEMS ('+ITEMS.length+' รายการ)');
    }
  }catch(e){
    console.warn('initNocoItems error:',e.message);
  }
}

// ── Merge helper (ใช้ใน loadContentItems เพื่อซิงค์ _nocoId) ──
function _applyNocoIds(rows){
  const _isImg=u=>{if(!u)return false;const l=u.toLowerCase();
    return l.endsWith('.jpg')||l.endsWith('.jpeg')||l.endsWith('.png')||
           l.endsWith('.webp')||l.endsWith('.gif')||
           ['stockcake','shutterstock','vecteezy','freepik','ibb.co',
            'istockphoto','pixabay','dreamstime','techresearchonline',
            'seekingalpha','decrypt.co','bookmap','blueberrymarkets',
            'ftcdn','businesspost','openaccessgovernment','starinvestment',
            'media.licdn','bnbstatic','equitypandit','centralworld',
            'hec.ca','corporatefinanceinstitute','thaifranchisecenter',
            'gstatic.com/images','img.freepik','cdn.prod.website'].some(h=>l.includes(h));
  };
  const nocoMapped = rows.map(r=>{
    const lk=ITEMS_IMG_LOOKUP[r.Title]||[];
    let img=r.ImageUrl||'',lnk=r.LinkUrl||'';
    if(!_isImg(img)&&_isImg(lnk)){[img,lnk]=[lnk,img];}
    if(!img&&lk[0]) img=lk[0];
    return{t:r.Title||'',s:r.Subtitle||'',i:img,l:lnk,
           p:r.Page||'home',y:r.Type||'service',z:r.Size||'1x1',_nocoId:r.Id};
  });
  if(nocoMapped.length > 0){
    // แทนที่ ITEMS ทั้งหมดด้วย NocoDB (source of truth)
    ITEMS.length = 0;
    nocoMapped.forEach(it=>ITEMS.push(it));
    _nocoItemsLoaded = true;
    return 'full';
  }
  return 'empty';
}

// ─── Seed ALL default ITEMS to NocoDB (ใช้ ITEMS_DEFAULT เสมอ) ───
async function seedItemsToNoco(){
  if(!NOCO.tbl.items){
    try{ await ensureItemsTable(); }catch(e){ alert('ไม่สามารถสร้าง Items table: '+e.message); return; }
    if(!NOCO.tbl.items){ alert('ไม่สามารถสร้าง Items table ได้'); return; }
  }
  const el=document.getElementById('content-items-list');
  const statusEl=el?.querySelector('div');
  const seedSource = ITEMS_DEFAULT; // ใช้ hardcode backup เสมอ
  if(statusEl) statusEl.textContent='⏳ กำลัง Seed ข้อมูลขึ้น NocoDB... (0/'+seedSource.length+')';

  let success=0, fail=0;
  for(let i=0;i<seedSource.length;i++){
    const it=seedSource[i];
    try{
      const body={Title:it.t,Subtitle:it.s||'',ImageUrl:it.i||'',LinkUrl:it.l||'',
                  Page:it.p||'home',Type:it.y||'service',Size:it.z||'1x1'};
      const res=await nocoPost(NOCO.tbl.items,body);
      if(res&&res.Id) success++;
      if(statusEl) statusEl.textContent=`⏳ Seed ข้อมูล... (${success}/${seedSource.length})`;
    }catch(e){ fail++; console.warn('Seed failed:',it.t,e.message); }
  }
  delete _cache[NOCO.tbl.items+''];
  if(statusEl) statusEl.innerHTML=`<span style="color:#22c55e;">✅ Seed สำเร็จ ${success} รายการ${fail?' | ⚠️ ล้มเหลว '+fail+' รายการ':''}</span>`;
  // โหลด NocoDB data ใหม่ทันที
  _nocoItemsLoaded=false;
  setTimeout(()=>initNocoItems().then(()=>loadContentItems()), 800);
}

// ─── Create ITEMS table in NocoDB if not exists ───
async function ensureItemsTable(){
  // ลอง endpoint ทั้ง NocoDB v0.9x และ v0.11+
  const endpoints = [
    `${NOCO.base}/api/v1/db/meta/projects/${NOCO.proj}/tables`,  // v0.9x
    `${NOCO.base}/api/v1/meta/tables?baseId=${NOCO.proj}`,        // v0.11+
  ];
  for(const ep of endpoints){
    try{
      const metaR=await fetch(ep,{headers:{'xc-token':NOCO.token}});
      if(!metaR.ok) continue;
      const meta=await metaR.json();
      const list=meta.list||meta.tables||[];
      const existing=list.find(t=>/^items$/i.test(t.title||t.name||''));
      if(existing){
        NOCO.tbl.items=existing.id;
        console.log('✅ Items table found:',existing.id);
        return;
      }
      // Table not found — สร้างใหม่
      const cr=await fetch(ep,{
        method:'POST',
        headers:{'xc-token':NOCO.token,'Content-Type':'application/json'},
        body:JSON.stringify({
          title:'Items',
          columns:[
            {title:'Title',uidt:'SingleLineText'},
            {title:'Subtitle',uidt:'LongText'},
            {title:'ImageUrl',uidt:'URL'},
            {title:'LinkUrl',uidt:'URL'},
            {title:'Page',uidt:'SingleLineText'},
            {title:'Type',uidt:'SingleLineText'},
            {title:'Size',uidt:'SingleLineText'}
          ]
        })
      });
      if(cr.ok){ const ct=await cr.json(); NOCO.tbl.items=ct.id||ct.table?.id; console.log('✅ Items table created:',NOCO.tbl.items); return; }
    }catch(e){ console.warn('ensureItemsTable attempt failed:',e.message); }
  }
  console.warn('⚠️ ensureItemsTable: ไม่สามารถเข้าถึง NocoDB Meta API — จะใช้ local ITEMS แทน');
}

async function saveContentItem(){
  const t=document.getElementById('edit-item-t')?.value.trim();
  const s=document.getElementById('edit-item-s')?.value.trim();
  const i=document.getElementById('edit-item-i')?.value.trim();
  const l=document.getElementById('edit-item-l')?.value.trim();
  const p=document.getElementById('edit-item-p')?.value;
  const y=document.getElementById('edit-item-y')?.value;
  const z=document.getElementById('edit-item-z')?.value;
  const msg=document.getElementById('edit-item-msg');
  if(!t){if(msg){msg.className='fmsg er';msg.textContent='กรุณากรอกหัวข้อ';msg.style.display='block';}return;}
  if(msg){msg.style.display='block';msg.className='fmsg';msg.textContent='⏳ กำลังบันทึก...';}
  const newItem={t,s:s||'',i:i||'',l:l||'',p:p||'home',y:y||'service',z:z||'1x1'};
  try{
    // ─── Ensure items table exists ───
    if(!NOCO.tbl.items){ try{ await ensureItemsTable(); }catch(e){ console.warn(e); } }
    let savedToNoco=false;
    const nocoBody={Title:t,Subtitle:s||'',ImageUrl:i||'',LinkUrl:l||'',Page:p||'home',Type:y||'service',Size:z||'1x1'};
    if(NOCO.tbl.items){
      try{
        const existingItem=editItemIndex>=0?ITEMS[editItemIndex]:null;
        if(existingItem&&existingItem._nocoId){
          // UPDATE existing row via PATCH
          const patchR=await fetch(
            `${NOCO.base}/api/v1/db/data/noco/${NOCO.proj}/${NOCO.tbl.items}/${existingItem._nocoId}`,
            {method:'PATCH',headers:{'xc-token':NOCO.token,'Content-Type':'application/json'},body:JSON.stringify(nocoBody)}
          );
          if(patchR.ok){ savedToNoco=true; newItem._nocoId=existingItem._nocoId; }
          else console.warn('PATCH failed:', patchR.status);
        }else{
          // INSERT new row
          const postR=await nocoPost(NOCO.tbl.items, nocoBody);
          if(postR&&postR.Id){ newItem._nocoId=postR.Id; savedToNoco=true; }
        }
        delete _cache[NOCO.tbl.items+'']; // invalidate cache
      }catch(e){ console.warn('NocoDB ITEMS save:', e); }
    }
    // Update local ITEMS array
    if(editItemIndex>=0){ ITEMS[editItemIndex]=newItem; }
    else{ ITEMS.push(newItem); }
    if(msg){
      msg.className='fmsg ok';
      msg.textContent=savedToNoco?'✅ บันทึกสำเร็จ (NocoDB ✓)':'✅ บันทึกสำเร็จ (local — กรุณาตรวจสอบ NocoDB token)';
      msg.style.display='block';
    }
    setTimeout(()=>{
      document.getElementById('content-edit-modal')?.remove();
      loadContentItems();
      // Re-render information panel ด้วย NocoDB data ล่าสุด
      refreshInfoPanel();
    },1200);
  }catch(e){
    if(msg){msg.className='fmsg er';msg.textContent='❌ '+e.message;msg.style.display='block';}
  }
}

// ─── Delete content item ───
async function deleteContentItem(idx){
  const it=ITEMS[idx];
  if(!it) return;
  if(!confirm(`ลบ "${it.t}" ?\n\nการลบนี้จะมีผลใน session นี้เท่านั้น (จะไม่หายจาก NocoDB ทันที)`)) return;
  // Remove from NocoDB if synced
  if(it._nocoId && NOCO.tbl.items){
    try{
      await fetch(`${NOCO.base}/api/v1/db/data/noco/${NOCO.proj}/${NOCO.tbl.items}/${it._nocoId}`,
        {method:'DELETE',headers:{'xc-token':NOCO.token}});
    }catch(e){ console.warn('NocoDB delete error:',e); }
  }
  ITEMS.splice(idx,1);
  loadContentItems();
  // Refresh info pages
  document.querySelectorAll('.info-subpage').forEach(el=>{
    const pgId=el.id.replace('isp_','');
    if(pgId) el.innerHTML=renderItemsPage(pgId);
  });
}

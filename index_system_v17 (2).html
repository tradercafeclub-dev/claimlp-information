const nocoLoaded={};
async function loadNoco(m){
  if(nocoLoaded[m.id]) return;
  nocoLoaded[m.id]=true;
  setDot(m.id,'loading');
  const el=document.getElementById('np_'+m.id);
  if(!el) return;
  try{
    const rows=await nocoGet(NOCO.tbl[m.tbl]);
    const loader=document.getElementById('loader_'+m.id);
    if(loader){loader.classList.add('gone');setTimeout(()=>loader.remove(),600);}
    if(!rows.length){
      el.innerHTML+=`<div style="text-align:center;padding:30px;color:var(--text-dim);">📭 ยังไม่มีข้อมูล</div>`;
      setDot(m.id,'ready'); return;
    }
    const cols=Object.keys(rows[0]).filter(k=>k!=='Id'&&!k.startsWith('nc_')&&k!=='CreatedAt'&&k!=='UpdatedAt').slice(0,8);
    const numCols=cols.filter(c=>rows.some(r=>r[c]!==null&&r[c]!==''&&!isNaN(parseFloat(r[c]))));
    const totalRows=rows.length;
    let statsHTML=`<div class="noco-stat"><div class="sv">${totalRows}</div><div class="sl">รายการทั้งหมด</div></div>`;
    numCols.slice(0,3).forEach(c=>{
      const sum=rows.reduce((a,r)=>a+(parseFloat(r[c])||0),0);
      statsHTML+=`<div class="noco-stat"><div class="sv">${sum%1?sum.toFixed(2):sum}</div><div class="sl">${c}</div></div>`;
    });
    el.innerHTML+=`
      <div class="noco-title">${m.icon} ${m.label}</div>
      <div class="noco-stats">${statsHTML}</div>
      <div class="search-bar"><input class="search-input" id="si_${m.id}" placeholder="🔍 ค้นหา..." oninput="filterTable('${m.id}')"></div>
      <div class="tbl-wrap">
        <table id="tbl_${m.id}">
          <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
          <tbody>${rows.map(r=>`
            <tr data-q="${Object.values(r).join(' ').toLowerCase()}">
              ${cols.map(c=>{
                const v=String(r[c]??'-');
                const lo=v.toLowerCase();
                const cls=(lo==='approved'||lo==='paid'||lo==='active')?'b-green':(lo==='pending')?'b-yellow':(lo==='rejected')?'b-red':'';
                return`<td>${cls?`<span class="bdg ${cls}">${v}</span>`:v}</td>`;
              }).join('')}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    setDot(m.id,'ready');
  }catch(e){
    const loader=document.getElementById('loader_'+m.id);
    if(loader){loader.classList.add('gone');setTimeout(()=>loader.remove(),600);}
    el.innerHTML+=`<div class="noco-err">⚠️ ${e.message.includes('429')?'Rate Limit (429) — กรุณารอสักครู่':e.message}</div>
      <button class="retry-btn" onclick="retryNoco('${m.id}')">🔄 Retry</button>`;
    setDot(m.id,'err');
  }
}
function retryNoco(id){

async function submitClaim(type){
  const isLP=type==='lp';
  const pre=isLP?'lp':'c10';
  const name=v(pre+'_name'), phone=v(pre+'_phone'), bnbid=v(pre+'_bnbid'), team=v(pre+'_team');
  const detail=v(pre+'_detail');
  const msg=document.getElementById(pre+'_msg');
  const btn=document.getElementById(pre+'_btn');

  if(!name||!phone||!bnbid||!team){showMsg(msg,'er','กรุณากรอกข้อมูลที่มี * ให้ครบ');return;}

  btn.disabled=true; btn.textContent='กำลังส่ง...';
  try{
    const tid=isLP?NOCO.tbl.claimlp:NOCO.tbl.claim10;
    if(!tid) throw new Error('ยังไม่ได้สร้าง Table (กรุณารอสักครู่แล้วลองใหม่)');

    const body={Name:name,Phone:phone,BnbId:bnbid,Team:team,Detail:detail,Status:'Pending',
      CreatedAt:new Date().toISOString()};
    if(isLP){
      body.PortfolioValue=parseFloat(v(pre+'_port'))||0;
      body.DamageDate=v(pre+'_date');
    }else{
      body.TradeMonth=v(pre+'_month');
      body.ExpectedProfit=parseFloat(v(pre+'_expect'))||0;
      body.ActualProfit=parseFloat(v(pre+'_actual'))||0;
    }
    await nocoPost(tid, body);
    showMsg(msg,'ok',`✅ ส่งคำร้องสำเร็จ! ทีมงานจะตรวจสอบและติดต่อกลับภายใน 24 ชั่วโมง`);
    // clear form
    ['name','phone','bnbid','team','detail',
     isLP?'port':'month',isLP?'date':'expect','actual'].forEach(f=>{
      const el=document.getElementById(pre+'_'+f); if(el) el.value='';
    });
    // โหลดประวัติ
    loadClaimHistory(type);
  }catch(e){
    showMsg(msg,'er','เกิดข้อผิดพลาด: '+e.message);
  }finally{
    btn.disabled=false; btn.textContent='📨 ส่งคำร้อง';
  }
}

async function loadClaimHistory(type){

// ═══════════════ API ═══════════════
async function ndbFetch(table,params={}){
  const url=new URL(`${WORKER_URL}/api/${table}`);
  url.searchParams.set('limit',params.limit||100);
  if(params.sort)url.searchParams.set('sort',params.sort);
  if(params.offset)url.searchParams.set('offset',params.offset||0);
  const res=await fetch(url.toString());
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`API ${res.status}`);}
  return res.json();
}

// Fetch ALL records by paginating until no more data
async function ndbFetchAll(table,params={}){
  const PAGE_SIZE=100;
  let allRecords=[];
  let offset=0;
  let totalPages=0;
  while(true){
    const d=await ndbFetch(table,{...params,limit:PAGE_SIZE,offset});
    const records=d.list||d.data?.list||[];
    const pageInfo=d.pageInfo||d.data?.pageInfo||{};
    allRecords=allRecords.concat(records);
    totalPages++;
    // Stop if: fewer records than page size OR reached total count OR empty
    const totalCount=pageInfo.totalRows||pageInfo.total||0;
    if(records.length<PAGE_SIZE||(totalCount>0&&allRecords.length>=totalCount)||records.length===0){
      break;
    }
    offset+=PAGE_SIZE;
    // Safety cap: max 20 pages = 2000 records
    if(totalPages>=20) break;
  }
  return allRecords;
}
// ── ตรวจสอบและสร้าง columns ที่ขาดหายไปในตาราง members ──
async function ensureMembersColumns(showResult=false){
  const tableId = NOCO.tbl.members;
  if(!tableId) return {ok:false, msg:'ไม่พบ members table ID'};

  const REQUIRED_COLS = [
    { title:'Phone',       uidt:'SingleLineText' },
    { title:'Binance_IMG', uidt:'LongText'       },
    { title:'Country',     uidt:'SingleLineText' },
    { title:'Province',    uidt:'SingleLineText' },
  ];

  const resultEl = showResult ? document.getElementById('db-fix-result') : null;
  if(resultEl) resultEl.innerHTML = '<span style="color:var(--gold)">⏳ กำลังตรวจสอบ columns...</span>';

  try{
    // ดึง column list — ใช้ xc-token เหมือน nocoGet
    const colR = await fetch(
      `${NOCO.base}/api/v1/db/meta/tables/${tableId}/columns`,
      { headers: { 'xc-token': NOCO.token } }
    );
    if(!colR.ok) throw new Error('HTTP '+colR.status+' — ไม่สามารถอ่าน columns ได้');
    const colData = await colR.json();
    const existing = (colData.columns || colData.list || []).map(c => c.title);

    let created = [], skipped = [];
    for(const col of REQUIRED_COLS){
      if(existing.includes(col.title)){ skipped.push(col.title); continue; }
      const cr = await fetch(
        `${NOCO.base}/api/v1/db/meta/tables/${tableId}/columns`,
        { method:'POST',
          headers:{'xc-token':NOCO.token,'Content-Type':'application/json'},
          body: JSON.stringify(col) }
      );
      if(cr.ok){ created.push(col.title); }
      else { const t=await cr.text(); console.warn(`column "${col.title}":`,t); }
    }

    const msg = created.length
      ? `✅ สร้าง columns สำเร็จ: ${created.map(c=>`<b>${c}</b>`).join(', ')}`
      : `✅ ครบถ้วนแล้ว — columns ทั้งหมดมีอยู่แล้ว`;
    if(resultEl) resultEl.innerHTML = `<span style="color:var(--green)">${msg}</span>`;
    console.log('[ensureMembersColumns]', msg);
    return {ok:true, created, skipped};
  }catch(e){
    const msg = `❌ ${e.message}`;
    if(resultEl) resultEl.innerHTML = `<span style="color:#f6465d">${msg}<br>
      <small style="color:var(--text-dim)">กรุณาเพิ่ม columns ด้วยตนเองใน NocoDB:<br>
      Phone, Binance_IMG (LongText), Country, Province</small></span>`;
    console.warn('[ensureMembersColumns]', e.message);
    return {ok:false, msg};
  }
}

// ── filter function: คืน array ที่ผ่านเงื่อนไขทั้งหมด + เรียงใหม่→เก่า ──
function pexFilter(){
  const q = pexSearchText;
  let result = PAYMENTS.filter(p=>{
    // ── text search ตาม mode ──
    if(q){
      const name  = payVal(p,'name').toLowerCase();
      const uid   = payVal(p,'bnb_id').toLowerCase();
      const team  = payVal(p,'team').toLowerCase();
      const lva   = payVal(p,'lva').toLowerCase();
      const lvb   = payVal(p,'lvb').toLowerCase();

      if(pexTypeFilter==='all'){
        // ทั้งหมด: ค้นหาจากทุก field
        if(!name.includes(q)&&!uid.includes(q)&&!team.includes(q)&&!lva.includes(q)&&!lvb.includes(q)) return false;
      } else if(pexTypeFilter==='team'){
        // โหมดทีม: ค้นหาเฉพาะ field team
        if(!team.includes(q) && !name.includes(q) && !uid.includes(q)) return false;
      } else if(pexTypeFilter==='lva'){
        // โหมด Level A: ค้นหาเฉพาะ field lva
        if(!lva.includes(q) && !name.includes(q) && !uid.includes(q)) return false;
      } else if(pexTypeFilter==='lvb'){
        // โหมด Level B: ค้นหาเฉพาะ field lvb
        if(!lvb.includes(q) && !name.includes(q) && !uid.includes(q)) return false;
      }
    }

    // ── mode filter: กรองตาม field ของ mode นั้นต้องมีค่า และตรงกับ q ──
    if(pexTypeFilter==='team'){
      // ต้องสังกัดทีมนั้น (team field ต้องตรง)
      if(!payVal(p,'team')) return false;
      if(q && !payVal(p,'team').toLowerCase().includes(q) &&
              !payVal(p,'name').toLowerCase().includes(q) &&
              !payVal(p,'bnb_id').toLowerCase().includes(q)) return false;
    }
    if(pexTypeFilter==='lva'){
      if(!payVal(p,'lva')) return false;
      if(q && !payVal(p,'lva').toLowerCase().includes(q) &&
              !payVal(p,'name').toLowerCase().includes(q) &&
              !payVal(p,'bnb_id').toLowerCase().includes(q)) return false;
    }
    if(pexTypeFilter==='lvb'){
      if(!payVal(p,'lvb')) return false;
      if(q && !payVal(p,'lvb').toLowerCase().includes(q) &&
              !payVal(p,'name').toLowerCase().includes(q) &&
              !payVal(p,'bnb_id').toLowerCase().includes(q)) return false;
    }

    // status filter
    if(pexStatusFilter==='approve' && payVal(p,'position')!=='Approve') return false;
    if(pexStatusFilter==='pending' && payVal(p,'position')==='Approve') return false;
    // month filter
    if(pexMonthFilter){
      const d = parsePayDate(payVal(p,'date'));
      if(!d) return false;
      const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if(mk !== pexMonthFilter) return false;
    }
    return true;
  });

  // เรียงจากใหม่ → เก่า (วันที่ทำรายการ)
  result.sort((a,b)=>{
    const da = parsePayDate(payVal(a,'date'));
    const db = parsePayDate(payVal(b,'date'));
    if(!da&&!db) return 0;
    if(!da) return 1;
    if(!db) return -1;
    return db - da;
  });
  return result;
}

  const tagsEl = document.getElementById('pex-active-filters');
  if(tagsEl){
    const tags=[];
    if(pexSearchText) tags.push(`<span class="pex-filter-tag" onclick="pexClearSearch()">🔍 "${pexSearchText}" ✕</span>`);
    if(pexTypeFilter!=='all'){
      const lbl={team:'🏠 ทีม',lva:'🅰️ Level A',lvb:'🅱️ Level B'}[pexTypeFilter];
      const cls={team:'',lva:'la-tag',lvb:'lb-tag'}[pexTypeFilter];
      tags.push(`<span class="pex-filter-tag ${cls}" onclick="pexSetMode('all')">${lbl} ✕</span>`);
    }
    if(pexStatusFilter){
      const lbl=pexStatusFilter==='approve'?'✅ จ่ายแล้ว':'⏳ รอชำระ';
      tags.push(`<span class="pex-filter-tag" onclick="pexSetStatus('${pexStatusFilter}')">${lbl} ✕</span>`);
    }
    if(pexMonthFilter){
      const [y,m]=pexMonthFilter.split('-');
      tags.push(`<span class="pex-filter-tag month-tag" onclick="document.getElementById('pex-month-filter').value='';pexSearch()">📅 ${getThaiMonth(parseInt(m))} ${parseInt(y)+543} ✕</span>`);
    }
    tagsEl.innerHTML = tags.join('');
  }

  // ── Pagination ──
  const totalPages = Math.max(1, Math.ceil(filtered.length/PEX_PAGE_SIZE));
  if(pexPage >= totalPages) pexPage = totalPages-1;
  const pageData = filtered.slice(pexPage*PEX_PAGE_SIZE, (pexPage+1)*PEX_PAGE_SIZE);

  // ── List render ──
  const listEl = document.getElementById('pex-list');
  if(!listEl) return;

  if(!pageData.length){
    listEl.innerHTML=`<div class="pex-empty">
      <div class="pex-empty-icon">🔍</div>
      <div style="font-weight:600;margin-bottom:6px;color:var(--text);">ไม่พบรายการที่ตรงกัน</div>
      <div style="font-size:0.82rem;">ลองเปลี่ยนคำค้นหาหรือตัวกรอง</div>
    </div>`;
  } else {
    // หัวแสดง context ของ mode
    const modeLabel = {
      all:'รายการทั้งหมด',
      team:'กรองตาม Your Team',
      lva:'กรองตาม Level A',
      lvb:'กรองตาม Level B'
    }[pexTypeFilter]||'';
    const timeLbl = pexMonthFilter ? (()=>{ const [y,m]=pexMonthFilter.split('-'); return `${getThaiMonth(parseInt(m))} ${parseInt(y)+543}`; })() : 'ทุกเดือน';

    listEl.innerHTML =
      `<div class="pex-list-header">${modeLabel} · ${timeLbl} · เรียงล่าสุดก่อน</div>` +
      pageData.map((p,i)=>{
        const name   = payVal(p,'name');
        const bnbId  = payVal(p,'bnb_id');
        const team   = payVal(p,'team');
        const lva    = payVal(p,'lva');
        const lvb    = payVal(p,'lvb');
        const date   = payVal(p,'date');
        const profit = payNum(p,'profit');
        const member = payNum(p,'member');
        const guar   = payNum(p,'guarantee');
        const status = payVal(p,'position');
        const ok     = status==='Approve';
        const initials = name ? name.charAt(0).toUpperCase() : '?';

        const teamTag = team?`<span class="pex-tag pex-tag-team" onclick="event.stopPropagation();pexFilterByTag('${team.replace(/'/g,"\\'")}')">🏠 ${team}</span>`:'';
        const lvaTag  = lva ?`<span class="pex-tag pex-tag-lva"  onclick="event.stopPropagation();pexFilterByTag('${lva.replace(/'/g,"\\'")}')">🅰️ ${lva}</span>` :'';
        const lvbTag  = lvb ?`<span class="pex-tag pex-tag-lvb"  onclick="event.stopPropagation();pexFilterByTag('${lvb.replace(/'/g,"\\'")}')">🅱️ ${lvb}</span>` :'';

        return`${i>0?'<div class="pex-row-divider"></div>':''}
        <div class="pex-row" onclick="showPaymentDetail('${p.Id}')">
          <div class="pex-row-avatar">${initials}</div>
          <div class="pex-row-main">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;">
              <div class="pex-row-name" style="flex:1;">${name}</div>
              <div class="pex-row-profit">${fmtD(profit)}</div>
            </div>
            <div class="pex-row-meta" style="margin-top:3px;">
              ${bnbId?`<span style="font-size:0.63rem;color:var(--muted);">UID:${bnbId}</span>`:''}
              <span class="pex-row-date">📅 ${date}</span>
              <span class="pex-row-member">👤 ${fmtD(member)}</span>
              <span style="font-size:0.65rem;color:var(--blue);">🛡 ${fmtD(guar)}</span>
            </div>
            <div class="pex-row-meta" style="margin-top:4px;">
              ${teamTag}${lvaTag}${lvbTag}
              <span class="badge ${ok?'badge-approve':'badge-pending'}" style="font-size:0.62rem;padding:1px 7px;">${ok?'✅ จ่าย':'⏳ รอ'}</span>
            </div>
          </div>
        </div>`;
      }).join('');
  }

  // ── Pagination buttons ──
  const pgEl = document.getElementById('pex-pagination');
  if(!pgEl) return;
  if(totalPages<=1){pgEl.innerHTML='';return;}

  function pgBtn(idx, label, active=false, disabled=false){
    if(disabled) return `<button class="pex-page-btn" disabled>${label}</button>`;
    return `<button class="pex-page-btn ${active?'pex-page-active':''}" onclick="pexGoPage(${idx})">${label}</button>`;
  }
  const pageSet = new Set();
  for(let i=0;i<Math.min(3,totalPages);i++) pageSet.add(i);
  for(let i=Math.max(0,totalPages-2);i<totalPages;i++) pageSet.add(i);
  for(let i=Math.max(0,pexPage-1);i<=Math.min(totalPages-1,pexPage+1);i++) pageSet.add(i);
  const pages = [...pageSet].sort((a,b)=>a-b);

  let pgHtml = `<span class="pex-page-info">หน้า ${pexPage+1}/${totalPages}</span>`;
  pgHtml += pgBtn(pexPage-1,'‹',false,pexPage===0);
  let prev=-1;
  for(const pg of pages){
    if(prev>=0 && pg-prev>1) pgHtml+=`<span class="pex-page-info">…</span>`;
    pgHtml += pgBtn(pg, pg+1, pg===pexPage);
    prev=pg;
  }
  pgHtml += pgBtn(pexPage+1,'›',false,pexPage>=totalPages-1);
  pgHtml += `<span class="pex-page-info">(${filtered.length} รายการ)</span>`;
  pgEl.innerHTML = pgHtml;
}

function pexGoPage(page){
  pexPage = page;
  pexRender();
  document.getElementById('payment-explorer-card')?.scrollIntoView({behavior:'smooth',block:'start'});
}

function pexFilterByTag(name){
  const inp = document.getElementById('pex-search-text');
  if(inp){ inp.value=name; }
  pexSearchText = name.toLowerCase();
  const clearBtn = document.getElementById('pex-clear-btn');
  if(clearBtn) clearBtn.classList.add('show');
  pexPage=0; pexRender();
}

function showMemberDashboard(memberId){
  const m=MEMBERS.find(x=>memVal(x,'id')===String(memberId));
  if(!m)return;
  document.getElementById('member-search-results').style.display='none';
  document.getElementById('member-dashboard').style.display='block';
  document.getElementById('dash-name').textContent=memVal(m,'name');
  document.getElementById('dash-id').textContent=memVal(m,'id');
  document.getElementById('dash-team').textContent=memVal(m,'team');
  // ดึง Level A/B จาก payment ล่าสุดของสมาชิก (ข้อมูลแม่นกว่า members table)
  const memberPays=PAYMENTS.filter(p=>payVal(p,'bnb_id')===String(memberId));
  const latestPay=memberPays[0]||null;
  const lvaVal=(latestPay?payVal(latestPay,'lva'):'')||memVal(m,'lva')||'—';
  const lvbVal=(latestPay?payVal(latestPay,'lvb'):'')||memVal(m,'lvb')||'—';
  document.getElementById('dash-lva').textContent=lvaVal;
  document.getElementById('dash-lvb').textContent=lvbVal;
  const st=memVal(m,'status');
  document.getElementById('dash-status').innerHTML=`<span class="badge ${st==='Pending'?'badge-pending':'badge-approve'}">${st||'Active'}</span>`;
  document.getElementById('dash-wallet').textContent=memVal(m,'wallet')||'ยังไม่ได้ตั้งค่า';
  currentMemberPayments=PAYMENTS.filter(p=>payVal(p,'bnb_id')===String(memberId));
  renderMemberPayments(currentMemberPayments);
  document.getElementById('member-dashboard').scrollIntoView({behavior:'smooth'});
}

  const c=document.getElementById('trade-rows');
  if(!tradeRows.length){c.innerHTML='<div style="text-align:center;color:var(--muted);padding:16px;font-size:0.85rem;">กดปุ่ม "+ เพิ่มรายการ" เพื่อเพิ่มรายการเทรด</div>';return;}

function updateCalc(){
  const total=tradeRows.reduce((s,r)=>s+(r.profit||0),0);
  const comm=total*.10,guar=total*.10,bal=total*.80,mem=bal*.50,cen=bal*.50,trans=cen+comm;
  document.getElementById('total-trade-profit').textContent=`${fmtUSD(total)}`;
  document.getElementById('calc-total').textContent=`${fmtUSD(total)}`;
  document.getElementById('calc-guarantee').textContent=`-${fmtUSD(guar)}`;
  document.getElementById('calc-commission').textContent=`-${fmtUSD(comm)}`;
  document.getElementById('calc-balance').textContent=`${fmtUSD(bal)}`;
  document.getElementById('calc-member').textContent=`${fmtUSD(mem)}`;
  document.getElementById('calc-central').textContent=`${fmtUSD(cen)}`;
  document.getElementById('calc-transfer').textContent=`${fmtUSD(trans)}`;
}

// ═══════════════ SAVE PAYMENT ═══════════════
async function savePayment(){
  if(!selectedAdminMember){alert('กรุณาเลือกสมาชิกก่อน');return;}
  const total=tradeRows.reduce((s,r)=>s+(r.profit||0),0);
  if(total<=0){alert('กรุณากรอกรายการเทรดอย่างน้อย 1 รายการ');return;}
  const comm=total*.10,guar=total*.10,bal=total*.80,mem=bal*.50,cen=bal*.50,trans=cen+comm;
  const status=document.getElementById('af-position').value;
  const payDate=document.getElementById('af-payment-date').value;
  const note=document.getElementById('af-note').value;
  const today=new Date();
  let dateStr;
  if(payDate){const[y,mo,d]=payDate.split('-');dateStr=`${parseInt(d)}/${parseInt(mo)}/${y}`;}
  else{dateStr=`${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()}`;}
  const tradeNote=tradeRows.map((t,i)=>`ครั้งที่${i+1}: ${t.coin} +$${t.profit}`).join(' | ');
  const payload={'Field 1':memVal(selectedAdminMember,'id'),'Field 2':memVal(selectedAdminMember,'name'),'Field 3':memVal(selectedAdminMember,'team'),'Field 4':memVal(selectedAdminMember,'lva'),'Field 5':memVal(selectedAdminMember,'lvb'),'Field 6':dateStr,'Field 8':`${fmtUSD(total)}`,'10.00%':`${fmtUSD(comm)}`,'10.00%1':`${fmtUSD(guar)}`,'Field 11':`${fmtUSD(bal)}`,'50.00%':`${fmtUSD(mem)}`,'50.00%1':`${fmtUSD(cen)}`,'Field 14':`${fmtUSD(trans)}`,'Field 15':status,'Field 16':note||tradeNote};
  const btn=document.querySelector('[onclick="savePayment()"]');
  btn.textContent='⏳ กำลังบันทึก...';btn.disabled=true;
  const resEl=document.getElementById('save-result');
  try{
    await ndbInsert('payments',payload);
    resEl.innerHTML='<div class="api-ok">✅ บันทึกลง NocoDB สำเร็จ!</div>';
    await loadPayments();clearAdminForm();
    showSuccess('บันทึกสำเร็จ!',`บันทึกการจ่ายเงินให้ ${memVal(selectedAdminMember,'name')} ลง NocoDB แล้ว`);
  }catch(e){
    resEl.innerHTML=`<div class="api-err">❌ เกิดข้อผิดพลาด: ${e.message}</div>`;
    btn.textContent='💾 บันทึกและส่งข้อมูลไป NocoDB';btn.disabled=false;
  }
}

function clearAdminForm(){
  selectedAdminMember=null;tradeRows=[];
  document.getElementById('admin-payment-form').style.display='none';
  document.getElementById('admin-search').value='';
  document.getElementById('save-result').innerHTML='';
  const btn=document.querySelector('[onclick="savePayment()"]');
  if(btn){btn.textContent='💾 บันทึกและส่งข้อมูลไป NocoDB';btn.disabled=false;}
}

async function approvePayment(rowId,btnEl){
  btnEl.textContent='⏳...';btnEl.disabled=true;

// ── File upload handlers ──
function handleImgUpload(input, previewId, thumbId, btnId){
  const file = input.files[0];
  if(!file) return;
  // ลด resolution ก่อน เพื่อไม่ให้ base64 ใหญ่เกิน
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 800;
      let w = img.width, h = img.height;
      if(w > MAX || h > MAX){
        if(w > h){ h = Math.round(h * MAX/w); w = MAX; }
        else { w = Math.round(w * MAX/h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', 0.82);
      const thumb = document.getElementById(thumbId);
      const preview = document.getElementById(previewId);
      const btn = document.getElementById(btnId);
      if(thumb) thumb.src = b64;
      if(preview){ preview.style.display='block'; }
      if(btn) btn.style.borderColor='rgba(3,192,117,0.6)';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearImgUpload(inputId, previewId, thumbId, btnId){
  const inp = document.getElementById(inputId);
  const thumb = document.getElementById(thumbId);
  const preview = document.getElementById(previewId);
  const btn = document.getElementById(btnId);
  if(inp) inp.value='';
  if(thumb) thumb.src='';
  if(preview) preview.style.display='none';
  if(btn) btn.style.borderColor='rgba(240,185,11,0.35)';
}

}

  const monthLabel=getThaiMonth(month)+' '+(year+543);
  const nextM=month+1>12?1:month+1, nextY=month+1>12?year+1:year;
  const payDeadline=`15 ${getThaiMonth(nextM)} ${nextY+543}`;

  const titleEl=document.getElementById('admin-comm-month-title');
  const dlEl=document.getElementById('admin-comm-pay-deadline');
  if(titleEl) titleEl.textContent=`ค่าคอมมิชั่น ${monthLabel}`;
  if(dlEl) dlEl.textContent=`กำหนดจ่าย: ${payDeadline}`;

  // filter payments for this month
  const mPays=PAYMENTS.filter(p=>{
    const d=parsePayDate(payVal(p,'date'));
    return d&&d.getFullYear()===year&&d.getMonth()+1===month;
  });

  // collect all teams
  const teamNames=[...new Set([
    ...mPays.map(p=>payVal(p,'team')),
    ...mPays.map(p=>payVal(p,'lva')),
    ...mPays.map(p=>payVal(p,'lvb'))
  ])].filter(n=>n&&n.toLowerCase()!=='non'&&n!=='');

  let totalYT=0,totalLA=0,totalLB=0;
  let totalItems=0,approvedItems=0;

  // build per-team grouped cards
  const cards=[];
  teamNames.forEach(teamName=>{
    const ytP=mPays.filter(p=>payVal(p,'team')===teamName);
    const laP=mPays.filter(p=>payVal(p,'lva')===teamName);
    const lbP=mPays.filter(p=>payVal(p,'lvb')===teamName);

    const ytComm=ytP.reduce((s,p)=>s+payNum(p,'profit'),0)*0.10;
    const laComm=laP.reduce((s,p)=>s+payNum(p,'profit'),0)*0.10*0.15;
    const lbComm=lbP.reduce((s,p)=>s+payNum(p,'profit'),0)*0.10*0.10;
    const teamTotal=ytComm+laComm+lbComm;

    if(teamTotal===0) return;

    totalYT+=ytComm; totalLA+=laComm; totalLB+=lbComm;

    const types=[
      ytComm>0&&{type:'your-team',label:'Your Team',pill:'pill-yt',rowCls:'yt-row',color:'var(--gold)',comm:ytComm,pays:ytP,desc:'10% ของกำไรทีม'},
      laComm>0&&{type:'level-a',label:'Level A',pill:'pill-la',rowCls:'la-row',color:'var(--green)',comm:laComm,pays:laP,desc:'15% × 10% ของกำไร'},
      lbComm>0&&{type:'level-b',label:'Level B',pill:'pill-lb',rowCls:'lb-row',color:'var(--blue)',comm:lbComm,pays:lbP,desc:'10% × 10% ของกำไร'},
    ].filter(Boolean);

    totalItems+=types.length;
    const approvedCount=types.filter(t=>isCommApproved(teamName,monthKey,t.type)).length;
    approvedItems+=approvedCount;
    const allApproved=approvedCount===types.length;

    const typeRows=types.map(t=>{
      const approved=isCommApproved(teamName,monthKey,t.type);
      const members=[...new Set(t.pays.map(p=>payVal(p,'bnb_id')))].length;
      return`<div class="comm-type-row ${t.rowCls} ${approved?'approved-row':''}">
        <div class="comm-type-row-left">
          <span class="comm-type-pill ${t.pill}">${t.label}</span>
          <div>
            <div style="font-size:0.8rem;font-weight:600;">${t.desc}</div>
            <div class="comm-type-row-meta">${t.pays.length} รายการ · ${members} สมาชิก</div>
          </div>
        </div>
        <div class="comm-type-row-right">
          <div style="text-align:right;">
            <div style="font-size:0.65rem;color:var(--muted);">ค่าคอม</div>
            <div class="comm-type-amt" style="color:${t.color};">${fmt(t.comm)}</div>
          </div>
          ${approved
            ?`<span class="comm-paid">✅ อนุมัติแล้ว</span>
              <button class="btn btn-outline btn-sm" onclick="unapproveComm('${teamName.replace(/'/g,"\\'")}','${monthKey}','${t.type}')">↩️</button>`
            :`<span class="comm-unpaid">⏳ รอ</span>
              <button class="btn btn-success btn-sm" onclick="approveComm('${teamName.replace(/'/g,"\\'")}','${monthKey}','${t.type}')">✅ อนุมัติ</button>`
          }
        </div>
      </div>`;
    }).join('');

    cards.push(`<div class="comm-group-card ${allApproved?'all-approved':''}">
      <div class="comm-group-hd">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="comm-group-name">🏆 ${teamName}</span>
          ${allApproved
            ?'<span class="comm-paid">✅ อนุมัติทั้งหมดแล้ว</span>'
            :`<span class="comm-unpaid">⏳ ${approvedCount}/${types.length} อนุมัติ</span>`}
        </div>
        <div style="text-align:right;">
          <div class="comm-group-total-lbl">ยอดโอนรวม</div>
          <div class="comm-group-total">${fmt(teamTotal)}</div>
        </div>
      </div>
      <div class="comm-group-rows">
        ${typeRows}
      </div>
      <div class="comm-group-footer">
        <div class="comm-group-transfer">
          💸 ยอดโอนทั้งหมดให้ทีมนี้: <strong>${fmt(teamTotal)}</strong>
          ${ytComm>0?`<span style="margin-left:8px;color:var(--gold);">YT: ${fmt(ytComm)}</span>`:''}
          ${laComm>0?`<span style="margin-left:8px;color:var(--green);">LA: ${fmt(laComm)}</span>`:''}
          ${lbComm>0?`<span style="margin-left:8px;color:var(--blue);">LB: ${fmt(lbComm)}</span>`:''}
        </div>
        ${!allApproved
          ?`<button class="btn btn-gold btn-sm" onclick="approveTeamAll('${teamName.replace(/'/g,"\\'")}','${monthKey}')">✅ อนุมัติทั้งทีม</button>`
          :'<span style="font-size:0.75rem;color:var(--green);">✓ พร้อมโอน</span>'
        }
      </div>
    </div>`);
  });

  // update summary numbers
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('admin-comm-total-yt',fmt(totalYT));
  set('admin-comm-total-la',fmt(totalLA));
  set('admin-comm-total-lb',fmt(totalLB));
  set('admin-comm-grand-total',fmt(totalYT+totalLA+totalLB));
  set('admin-comm-approved-count',`${approvedItems}/${totalItems} อนุมัติแล้ว`);

  const listEl=document.getElementById('admin-comm-list');
  if(listEl) listEl.innerHTML=cards.join('')||'<div style="text-align:center;padding:20px;color:var(--muted);">ไม่มีข้อมูลเดือนนี้</div>';
}

// ═══════════════ COMMISSION DASHBOARD ═══════════════


function renderCommDashboard(monthKey, page){
  commDashMonth = (monthKey===''||monthKey===null||monthKey===undefined)?null:monthKey;
  commDashPage = (page===undefined||page===null)?0:page;
  const fmt=v=>'$'+v.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});

  const months={};
  PAYMENTS.forEach(p=>{
    const d=parsePayDate(payVal(p,'date'));
    if(d){const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;months[k]=true;}
  });
  const sorted=Object.keys(months).sort().reverse();
  const tabsEl=document.getElementById('comm-dash-month-tabs');
  if(tabsEl) tabsEl.innerHTML=
    `<button class="month-tab ${!commDashMonth?'active':''}" onclick="renderCommDashboard(null)">ทั้งหมด</button>`+
    sorted.map(k=>{
      const[y,m]=k.split('-');
      return`<button class="month-tab ${commDashMonth===k?'active':''}" onclick="renderCommDashboard('${k}')">${getThaiMonth(parseInt(m))} ${parseInt(y)+543}</button>`;
    }).join('');

  const pays = commDashMonth
    ? PAYMENTS.filter(p=>{const d=parsePayDate(payVal(p,'date'));return d&&`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`===commDashMonth;})
    : PAYMENTS;

  const teamNames=[...new Set([
    ...pays.map(p=>payVal(p,'team')),
    ...pays.map(p=>payVal(p,'lva')),
    ...pays.map(p=>payVal(p,'lvb'))
  ])].filter(n=>n&&n.toLowerCase()!=='non'&&n!=='');

  let totalYT=0,totalLA=0,totalLB=0;
  let ytTeams=0,laTeams=0,lbTeams=0,ytCnt=0,laCnt=0,lbCnt=0;

  // Build all rows sorted by total DESC
  const allRows=teamNames.map(teamName=>{
    const ytP=pays.filter(p=>payVal(p,'team')===teamName);
    const laP=pays.filter(p=>payVal(p,'lva')===teamName);
    const lbP=pays.filter(p=>payVal(p,'lvb')===teamName);
    const ytC=ytP.reduce((s,p)=>s+payNum(p,'profit'),0)*0.10;
    const laC=laP.reduce((s,p)=>s+payNum(p,'profit'),0)*0.10*0.15;
    const lbC=lbP.reduce((s,p)=>s+payNum(p,'profit'),0)*0.10*0.10;
    const tot=ytC+laC+lbC;
    return{teamName,ytC,laC,lbC,tot,ytPl:ytP.length,laPl:laP.length,lbPl:lbP.length};
  }).filter(r=>r.tot>0).sort((a,b)=>b.tot-a.tot);

  allRows.forEach(r=>{
    totalYT+=r.ytC; totalLA+=r.laC; totalLB+=r.lbC;
    if(r.ytC>0){ytTeams++;ytCnt+=r.ytPl;}
    if(r.laC>0){laTeams++;laCnt+=r.laPl;}
    if(r.lbC>0){lbTeams++;lbCnt+=r.lbPl;}
  });

  let deadlineStr='—';
  if(commDashMonth){
    const[y,m]=commDashMonth.split('-');
    const nm=parseInt(m)+1>12?1:parseInt(m)+1;
    const ny=parseInt(m)+1>12?parseInt(y)+1:parseInt(y);
    deadlineStr=`15 ${getThaiMonth(nm)} ${ny+543}`;
  }

  const totalPages=Math.ceil(allRows.length/COMM_DASH_PAGE_SIZE);
  const pageRows=allRows.slice(commDashPage*COMM_DASH_PAGE_SIZE,(commDashPage+1)*COMM_DASH_PAGE_SIZE);
  const rankColors=['#FFD700','#C0C0C0','#CD7F32'];

  const tableRows=pageRows.map((r,i)=>{
    const rank=commDashPage*COMM_DASH_PAGE_SIZE+i+1;
    const medal=rank<=3?rankColors[rank-1]:null;
    const rankCell=medal
      ?`<td style="text-align:center;font-size:1.1rem;">${['🥇','🥈','🥉'][rank-1]}</td>`
      :`<td style="text-align:center;color:var(--muted);font-size:0.82rem;">${rank}</td>`;
    return`<tr>
      ${rankCell}
      <td style="font-weight:700;${rank<=3?`color:${medal};`:''}">${r.teamName}</td>
      <td style="color:var(--gold);">${r.ytC>0?fmt(r.ytC):'<span style="opacity:0.25;">—</span>'}</td>
      <td style="color:var(--green);">${r.laC>0?fmt(r.laC):'<span style="opacity:0.25;">—</span>'}</td>
      <td style="color:var(--blue);">${r.lbC>0?fmt(r.lbC):'<span style="opacity:0.25;">—</span>'}</td>
      <td style="font-family:'Orbitron',monospace;font-weight:900;color:var(--gold);font-size:0.9rem;">${fmt(r.tot)}</td>
      <td style="font-size:0.73rem;color:var(--muted);">${deadlineStr}</td>
    </tr>`;
  }).join('');

  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('dash-yt-amt',fmt(totalYT)); set('dash-la-amt',fmt(totalLA)); set('dash-lb-amt',fmt(totalLB));
  set('dash-tot-amt',fmt(totalYT+totalLA+totalLB));
  set('dash-yt-sub',`${ytTeams} ทีม · ${ytCnt} รายการ`);
  set('dash-la-sub',`${laTeams} ทีม · ${laCnt} รายการ`);
  set('dash-lb-sub',`${lbTeams} ทีม · ${lbCnt} รายการ`);
  set('dash-tot-sub',`${allRows.length} ทีม · ทุกเลเวล`);

  const tbEl=document.getElementById('comm-dash-team-table');
  if(tbEl) tbEl.innerHTML=tableRows||`<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px;">ไม่มีข้อมูล</td></tr>`;

  // Pagination
  const pgEl=document.getElementById('comm-dash-pagination');
  if(pgEl){
    if(totalPages<=1){pgEl.innerHTML='';return;}
    const mk=commDashMonth||'';
    let h=`<span style="font-size:0.75rem;color:var(--muted);margin-right:4px;">หน้า ${commDashPage+1}/${totalPages}</span>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="renderCommDashboard('${mk}',${commDashPage-1})" ${commDashPage===0?'disabled':''}>←</button>`;
    for(let pg=0;pg<Math.min(totalPages,7);pg++){
      h+=`<button class="btn btn-sm ${pg===commDashPage?'btn-gold':'btn-outline'}" onclick="renderCommDashboard('${mk}',${pg})">${pg+1}</button>`;
    }
    if(totalPages>7) h+=`<span style="color:var(--muted);">…</span>`;
    h+=`<button class="btn btn-outline btn-sm" onclick="renderCommDashboard('${mk}',${commDashPage+1})" ${commDashPage>=totalPages-1?'disabled':''}>→</button>`;
    pgEl.innerHTML=h;
  }
}

function buildMonthTabs(teamName){
  // collect all months from relevant payments
  const relevant = getRelevantPayments(teamName, null);
  const months = {};
  relevant.forEach(p=>{
    const d = parsePayDate(payVal(p,'date'));
    if(d){ const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; months[key]=true; }
  });
  const sorted = Object.keys(months).sort().reverse();
  const tabs = document.getElementById('comm-month-tabs');
  tabs.innerHTML = `<button class="month-tab ${!commSelectedMonth?'active':''}" onclick="selectCommMonth(null,'${teamName}')">ทั้งหมด</button>`
    + sorted.map(k=>{
        const [y,m]=k.split('-');

      }).join('');
}

  renderCommission(teamName, monthKey);
}

function getRelevantPayments(teamName, monthKey){
  return PAYMENTS.filter(p=>{
    const inTeam = payVal(p,'team')===teamName;
    const isLvA  = payVal(p,'lva')===teamName;
    const isLvB  = payVal(p,'lvb')===teamName;
    if(!(inTeam||isLvA||isLvB)) return false;
    if(monthKey){
      const d = parsePayDate(payVal(p,'date'));
      if(!d) return false;
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if(key!==monthKey) return false;
    }
    return true;
  });
}

function parsePayDate(str){
  if(!str) return null;
  // format D/M/YYYY
  const parts = str.split('/');
  if(parts.length===3){
    const d=parseInt(parts[0]),m=parseInt(parts[1]),y=parseInt(parts[2]);
    if(!isNaN(d)&&!isNaN(m)&&!isNaN(y)) return new Date(y,m-1,d);
  }
  const d = new Date(str);
  return isNaN(d.getTime())?null:d;
}

function getThaiMonth(m){
  return ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][m]||'';
}

function renderCommission(teamName, monthKey){
  // ─── YOUR TEAM: payments where team === teamName ───
  const yourTeamPays = PAYMENTS.filter(p=>{
    if(payVal(p,'team')!==teamName) return false;
    if(monthKey){
      const d=parsePayDate(payVal(p,'date'));
      if(!d) return false;
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return key===monthKey;
    }
    return true;
  });

  // ─── LEVEL A: payments where lva === teamName ───
  const levelAPays = PAYMENTS.filter(p=>{
    if(payVal(p,'lva')!==teamName) return false;
    if(monthKey){
      const d=parsePayDate(payVal(p,'date'));
      if(!d) return false;
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return key===monthKey;
    }
    return true;
  });

  // ─── LEVEL B: payments where lvb === teamName ───
  const levelBPays = PAYMENTS.filter(p=>{
    if(payVal(p,'lvb')!==teamName) return false;
    if(monthKey){
      const d=parsePayDate(payVal(p,'date'));
      if(!d) return false;
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      return key===monthKey;
    }
    return true;
  });

  // ─── CALC YOUR TEAM ───
  const ytTotalProfit = yourTeamPays.reduce((s,p)=>s+payNum(p,'profit'),0);
  const ytComm = ytTotalProfit * 0.10; // 10% = your team commission
  const ytMembers = [...new Set(yourTeamPays.map(p=>payVal(p,'bnb_id')))].length;

  // ─── CALC LEVEL A ───

  // ─── UPDATE SUMMARY CARDS ───

  document.getElementById('sum-total').textContent = fmt(totalComm);
  document.getElementById('sum-total-sub').textContent = `รวม ${yourTeamPays.length+levelAPays.length+levelBPays.length} รายการ`;
  document.getElementById('sec-sum-your-team').textContent = fmt(ytComm);
  document.getElementById('sec-sum-level-a').textContent = fmt(laComm);

  // ─── YOUR TEAM STATS ───

function renderMonthlyTable(teamName){
  // collect all months
  const allPays = PAYMENTS.filter(p=>
    payVal(p,'team')===teamName||payVal(p,'lva')===teamName||payVal(p,'lvb')===teamName
  );
  const months = {};
  allPays.forEach(p=>{
    const d=parsePayDate(payVal(p,'date'));
    if(d){const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;months[key]=true;}
  });
  const sorted = Object.keys(months).sort().reverse();
  const fmt = v=>'$'+v.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  const today = new Date();

  const rows = sorted.map(key=>{
    const [y,m]=key.split('-');
    const year=parseInt(y),month=parseInt(m);
    // end of month
    const endOfMonth = new Date(year,month,0);
    const payDate = new Date(year,month,15); // 15th of NEXT month
    const isPast = payDate < today;

    const ytPays = PAYMENTS.filter(p=>{
      if(payVal(p,'team')!==teamName)return false;
      const d=parsePayDate(payVal(p,'date'));
      if(!d)return false;
      return d.getFullYear()===year&&d.getMonth()+1===month;
    });
    const laPays = PAYMENTS.filter(p=>{
      if(payVal(p,'lva')!==teamName)return false;
      const d=parsePayDate(payVal(p,'date'));
      if(!d)return false;
      return d.getFullYear()===year&&d.getMonth()+1===month;
    });
    const lbPays = PAYMENTS.filter(p=>{
      if(payVal(p,'lvb')!==teamName)return false;
      const d=parsePayDate(payVal(p,'date'));
      if(!d)return false;
      return d.getFullYear()===year&&d.getMonth()+1===month;
    });

    const ytComm = ytPays.reduce((s,p)=>s+payNum(p,'profit'),0)*0.10;
    const laProfit = laPays.reduce((s,p)=>s+payNum(p,'profit'),0);
    const laComm = laProfit*0.10*0.15;
    const lbProfit = lbPays.reduce((s,p)=>s+payNum(p,'profit'),0);
    const lbComm = lbProfit*0.10*0.10;
    const total = ytComm+laComm+lbComm;

    const monthLabel = getThaiMonth(month)+' '+(year+543);
    const payDateStr = `15 ${getThaiMonth(month+1>12?1:month+1)} ${(month+1>12?year+1:year)+543}`;

    return`<tr>
      <td style="font-weight:600;">${monthLabel}</td>
      <td style="color:var(--gold);">${fmt(ytComm)}</td>
      <td style="color:var(--green);">${fmt(laComm)}</td>
      <td style="color:var(--blue);">${fmt(lbComm)}</td>
      <td style="font-weight:700;color:var(--gold);">${fmt(total)}</td>
      <td style="color:var(--muted);font-size:0.78rem;">📅 ${payDateStr}</td>
      <td><span class="badge ${isPast?'badge-approve':'badge-pending'}">${isPast?'✅ จ่ายแล้ว':'⏳ รอจ่าย'}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('comm-monthly-table').innerHTML = rows||
    '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px;">ไม่มีข้อมูล</td></tr>';
}

function updateCommPaySchedule(){
  const today = new Date();
  const m = today.getMonth()+1;
  const y = today.getFullYear();
  // next 15th
  let payMonth = m, payYear = y;
  if(today.getDate()>15){payMonth=m+1;if(payMonth>12){payMonth=1;payYear=y+1;}}
  const nextPay = `วันที่ 15 ${getThaiMonth(payMonth)} ${payYear+543}`;
  const daysLeft = Math.ceil((new Date(payYear,payMonth-1,15)-today)/(1000*60*60*24));
  const el = document.getElementById('comm-next-pay');
  if(el) el.textContent = `ครั้งถัดไป: ${nextPay} (อีก ${daysLeft} วัน) · นับยอด ณ วันสิ้นเดือน ${getThaiMonth(m)} ${y+543}`;
}

// ═══════════════════════════════════════════════════
//  Override go() to handle new panel types
// ═══════════════════════════════════════════════════
const _origGo = go;
function go(id){
  const m=MENU.find(x=>x.id===id); if(!m) return;
  closeSidebar();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('visible'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const panel=document.getElementById('panel_'+id);
  if(!panel) return;
  panel.classList.add('visible');
  const sp=panel.querySelector('.scroll-panel');
  if(sp) sp.scrollTop=0;
  const navItem=document.querySelector(`.nav-item[data-id="${id}"]`);
  if(navItem) navItem.classList.add('active');
  document.getElementById('activeLabel').innerHTML=`<b>${m.icon} ${m.label}</b>`;
  document.title=`${m.label} — TCC`;
  history.replaceState(null,'','#'+id);

  // Lazy load iframes
  if((m.type==='iframe'||m.type==='content+iframe')&&!iframeLoaded[id]){
    iframeLoaded[id]=true;
    const ifr=document.getElementById('iframe_'+id);
    if(ifr){
      setDot(id,'loading');
      ifr.onload=()=>{
        setDot(id,'ready');
        const l=document.getElementById('loader_'+id);
        if(l){l.classList.add('gone');setTimeout(()=>l.remove(),600);}
      };
      ifr.src=m.url;
    }
  }
  if(m.type==='noco') loadNoco(m);
  // ── Information: re-render จาก NocoDB ล่าสุดทุกครั้งที่เปิดหน้า ──
  if(m.type==='items'){
    if(_nocoItemsLoaded){
      // โหลดแล้ว → re-render panel ทันที
      refreshInfoPanel();
    } else {
      // ยังไม่โหลด → โหลดแล้ว re-render
      initNocoItems().catch(e=>console.warn('initNocoItems:',e));
    }
  }
  // Market: force reload TradingView iframes ถ้ายังไม่โหลด (fix first-render)
  if(m.type==='market'){
    const charts = document.querySelectorAll('#panel_'+id+' .chart-frame');
    charts.forEach(ifr=>{
      if(!ifr.src || ifr.src==='about:blank' || ifr.src===''){
        const s=ifr.getAttribute('data-src')||ifr.src;
        if(s){ ifr.src=''; setTimeout(()=>{ ifr.src=s; },50); }
      }
    });
    // dispatch resize เพื่อ force TradingView re-render
    setTimeout(()=>window.dispatchEvent(new Event('resize')),100);
    setTimeout(()=>window.dispatchEvent(new Event('resize')),400);
  }
  if(m.type==='system-payment'){
    // Always ensure inner content is built first
    buildSystemPaymentInner();
    if(PAYMENTS.length){ buildSystemPaymentStats(); pexSearch&&pexSearch(); pexBuildMonthFilter&&pexBuildMonthFilter(); }
    else loadMainData();
  }
  if(m.type==='register'){
    // รีเซ็ตฟอร์มกลับ step 1 ทุกครั้ง
    [1,2,3].forEach(s=>{
      const stepForm=document.getElementById('reg-step-'+s);
      if(stepForm) stepForm.style.display= s===1?'block':'none';
      const dotEl=document.getElementById('step-'+s);
      if(dotEl){ dotEl.classList.toggle('active', s===1); }
    });
    // ล้าง validation message
    const resEl=document.getElementById('reg-result');
    if(resEl) resEl.innerHTML='';
    // populate teams (รอ TEAMS ถ้ายังไม่โหลด)
    populateRegTeams && populateRegTeams();
    populateRegProvinces && populateRegProvinces();
  }
  if(m.type==='yourteam-commission'){
    if(PAYMENTS.length) buildYourTeamCommission();
    else loadMainData().then(()=>{ if(PAYMENTS.length) buildYourTeamCommission(); });
  }
  if(m.type==='system'){
    const aw=document.getElementById('admin-auth-wall');
    const ad=document.getElementById('admin-dashboard');
    if(currentAdmin){
      if(aw) aw.style.display='none';
      if(ad){ ad.style.display='block'; updateAdminStats&&updateAdminStats(); }
    }
    if(!MEMBERS.length) loadMainData&&loadMainData();
    else updateAdminStats&&updateAdminStats();
  }
}

async function loadMainData(){
  showLoading('กำลังโหลดข้อมูล...');
  try{
    await Promise.all([loadMembers(),loadTeams(),loadPayments()]);
    hideLoading();
    const el=document.getElementById('db-status');
    if(el){el.textContent='🟢 NocoDB Connected';el.className='db-badge db-ok';}
    populateRegTeams&&populateRegTeams();
    populateRegProvinces&&populateRegProvinces();
    setTodayDate&&setTodayDate();
    if(currentAdmin) showAdminDashboard&&showAdminDashboard();
    buildSystemPaymentStats&&buildSystemPaymentStats();
    // Trigger commission build if user is on yourteam panel
    const ytWrap=document.getElementById('yourteam_comm_wrap');
    if(ytWrap && PAYMENTS.length) buildYourTeamCommission&&buildYourTeamCommission();
    // Trigger pex render if on payment panel
    if(PAYMENTS.length) { pexSearch&&pexSearch(); pexBuildMonthFilter&&pexBuildMonthFilter(); }
  }catch(e){
    hideLoading();
    const el=document.getElementById('db-status');
    if(el){el.textContent='🔴 Connection Error';el.className='db-badge db-err';}
    console.error('loadMainData error:',e);
  }
}

const _hashId = window.location.hash.replace('#','');
const _validIds = MENU.map(m=>m.id);
const initId = (_hashId && _validIds.includes(_hashId)) ? _hashId : 'market';
go(initId);
setTimeout(testConn, 600);
setTimeout(initClaimTables, 1500);
// ── สร้าง columns ที่ขาดหายไปใน members table ──
setTimeout(()=>{ ensureMembersColumns().catch(e=>console.warn('ensureMembersColumns:',e)); }, 1200);

setTimeout(()=>{ initNocoItems().catch(e=>console.warn('initNocoItems:',e)); }, 800);
setTimeout(()=>{ try{ensureItemsTable().then(()=>console.log("Items table ready")).catch(e=>console.warn(e));}catch(e){} }, 2200);
